<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dorfrallye Thalau</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { iosBlue: '#0A84FF', iosBg: '#000000', darkCard: '#1C1C1E' } } }
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Die durchgehende Linie für die Zeitachse */
        .timeline-line { position: absolute; left: 50%; transform: translateX(-50%); width: 2px; background: #333; top: 0; bottom: 0; z-index: 0; }
        
        /* Layout für die abwechselnden Kacheln */
        .timeline-item { width: 100%; display: flex; align-items: center; position: relative; margin-bottom: 40px; }
        .timeline-item.left { justify-content: flex-start; }
        .timeline-item.right { justify-content: flex-end; }
        .timeline-card-wrapper { width: 45%; }
        
        .leaflet-container { z-index: 1 !important; border-radius: 12px; }
        .text-shadow { text-shadow: 0px 2px 10px rgba(0,0,0,0.8); }

        /* Animation für das Pop-up */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // FIREBASE CONFIG (Deine existierenden Daten)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBpsE5x-nKFHk8fn_v85_1qseZaOXzGil0",
            authDomain: "dorf-rallye.firebaseapp.com",
            projectId: "dorf-rallye",
            storageBucket: "dorf-rallye.firebasestorage.app",
            messagingSenderId: "816087472841",
            appId: "1:816087472841:web:daacaf4554b37ce9a6cb18",
            measurementId: "G-M6E4P73X60"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ICONS ---
        const IconLock = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconChevronLeft = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-lg"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconMapPin = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;

        function App() {
            const [view, setView] = React.useState('loading'); 
            const [tours, setTours] = React.useState([]);
            const [allStations, setAllStations] = React.useState([]);
            const [activeTourId, setActiveTourId] = React.useState(null);

            React.useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (user) => {
                    if (view === 'loading') setView('player_tours');
                });
                return () => unsubAuth();
            }, [view]);

            React.useEffect(() => {
                const unsubTours = onSnapshot(collection(db, 'tours'), snap => setTours(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubStations = onSnapshot(collection(db, 'stations'), snap => setAllStations(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order)));
                return () => { unsubTours(); unsubStations(); };
            }, []);

            const changeView = (newView, tourId = null) => {
                setView(newView);
                if (tourId !== undefined) setActiveTourId(tourId);
            };

            // ----------------------------------------------------------------
            // SPIELER: DAS HAUPTSPIEL (HERO HEADER + TIMELINE + BOTTOM SHEET)
            // ----------------------------------------------------------------
            const PlayerGameView = () => {
                const [userLoc, setUserLoc] = React.useState(null);
                // Spiellogik-States
                const [currentStationIndex, setCurrentStationIndex] = React.useState(0);
                const [score, setScore] = React.useState(0);
                // Sheet States: 'navigating', 'at_station' (quiz/info), 'finished'
                const [sheetState, setSheetState] = React.useState('navigating'); 
                const [sheetMode, setSheetMode] = React.useState('quiz'); // 'quiz' or 'info'

                const activeTour = tours.find(t => t.id === activeTourId);
                const tourStations = allStations.filter(s => s.tourId === activeTourId);
                const currentStation = tourStations[currentStationIndex];

                // Globaler GPS Watcher (Startet nur einmal!)
                React.useEffect(() => {
                    if (!("geolocation" in navigator)) return;
                    const watchId = navigator.geolocation.watchPosition(
                        (pos) => setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => console.log("GPS Fehler", err),
                        { enableHighAccuracy: true, maximumAge: 5000, timeout: 5000 }
                    );
                    return () => navigator.geolocation.clearWatch(watchId);
                }, []);

                // Distanz-Berechnung & Trigger für Pop-Up
                const getDistance = (lat1, lon1, lat2, lon2) => {
                    if(!lat1 || !lon1 || !lat2 || !lon2) return null;
                    const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                    const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                    const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                };

                const currentDistance = currentStation && userLoc ? getDistance(userLoc.lat, userLoc.lng, currentStation.lat, currentStation.lng) : null;

                // Überprüfe Ankunft
                React.useEffect(() => {
                    if (sheetState === 'navigating' && currentDistance !== null && currentDistance <= 30) {
                        setSheetState('at_station');
                        setSheetMode(currentStation.hasQuiz ? 'quiz' : 'info');
                    }
                }, [currentDistance, sheetState, currentStation]);

                // Quiz Logic
                const handleQuizAnswer = (selectedIndex) => {
                    if (selectedIndex === currentStation.quiz?.correctIndex) {
                        setScore(s => s + 100); // 100 Punkte pro richtige Antwort
                    }
                    // Egal ob richtig oder falsch: Gehe SOFORT zur Info/Auflösung weiter
                    setSheetMode('info');
                };

                const handleNextStation = () => {
                    if (currentStationIndex + 1 < tourStations.length) {
                        setCurrentStationIndex(i => i + 1);
                        setSheetState('navigating');
                    } else {
                        setSheetState('finished');
                    }
                };

                // PDF Urkunde generieren
                const downloadCertificate = () => {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: "landscape" });
                    
                    // Design der Urkunde
                    doc.setFillColor(242, 242, 247); // iOS BG Color
                    doc.rect(0, 0, 300, 210, 'F');
                    
                    doc.setTextColor(10, 132, 255); // iOS Blue
                    doc.setFontSize(40);
                    doc.text("Urkunde", 148, 50, null, null, "center");
                    
                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(20);
                    doc.text(`Für die erfolgreiche Teilnahme an der`, 148, 80, null, null, "center");
                    
                    doc.setFontSize(26);
                    doc.text(`"${activeTour?.name || 'Dorfrallye'}"`, 148, 100, null, null, "center");

                    doc.setFontSize(18);
                    doc.text(`Erreichte Punktzahl: ${score} Punkte`, 148, 140, null, null, "center");

                    doc.setFontSize(12);
                    doc.setTextColor(100, 100, 100);
                    doc.text(`Ausgestellt am: ${new Date().toLocaleDateString('de-DE')}`, 148, 180, null, null, "center");

                    doc.save("Dorfrallye_Urkunde.pdf");
                };

                // --------------------------------------------------------
                // KOMPONENTE: Mini-Map für das Pop-up
                // --------------------------------------------------------
                const MiniMap = ({ targetLat, targetLng }) => {
                    const mapRef = React.useRef(null);
                    React.useEffect(() => {
                        if (!mapRef.current && userLoc) {
                            mapRef.current = L.map('mini-map', { zoomControl: false }).setView([userLoc.lat, userLoc.lng], 16);
                            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapRef.current);
                            
                            // Marker für User und Ziel
                            L.circleMarker([userLoc.lat, userLoc.lng], { color: '#0A84FF', radius: 8, fillOpacity: 1 }).addTo(mapRef.current);
                            L.marker([targetLat, targetLng]).addTo(mapRef.current);
                            
                            // Linie zeichnen
                            L.polyline([[userLoc.lat, userLoc.lng], [targetLat, targetLng]], { color: '#0A84FF', weight: 4, dashArray: '10, 10' }).addTo(mapRef.current);
                            mapRef.current.fitBounds([[userLoc.lat, userLoc.lng], [targetLat, targetLng]], { padding: [20, 20] });
                        }
                    }, [targetLat, targetLng, userLoc]);
                    return <div id="mini-map" className="h-40 w-full bg-gray-800 rounded-xl"></div>;
                };

                // --------------------------------------------------------
                // RENDER
                // --------------------------------------------------------
                return (
                    <div className="min-h-screen bg-black">
                        
                        {/* 1. DER FIXE HEADER (Genau wie auf dem Screenshot) */}
                        <header className="fixed top-0 left-0 w-full h-[35vh] z-50">
                            {/* Hintergrundbild */}
                            <img src={activeTour?.imageUrl || "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG"} 
                                 className="absolute inset-0 w-full h-full object-cover" alt="Hintergrund" />
                            
                            {/* Verdunkelung / Gradient nach unten für perfekten Text-Kontrast */}
                            <div className="absolute inset-0 bg-gradient-to-b from-black/30 via-black/50 to-black"></div>
                            
                            {/* Zurück-Button Oben Links */}
                            <button onClick={()=>changeView('player_tours')} className="absolute top-12 left-4 p-2 z-50">
                                <IconChevronLeft />
                            </button>

                            {/* Text Container: Mittig positioniert */}
                            <div className="absolute inset-0 flex flex-col items-center justify-center px-4 mt-6">
                                <h1 className="text-3xl font-bold text-white text-center leading-tight text-shadow">
                                    {activeTour?.name || "Historische Tour (lang)"}
                                </h1>
                                {/* GPS Badge */}
                                <div className="mt-4 px-4 py-1.5 rounded-full border border-green-500 bg-green-900/40 text-green-400 text-xs font-bold uppercase tracking-widest backdrop-blur-sm">
                                    {userLoc ? "GPS AKTIV" : "SUCHE GPS..."}
                                </div>
                            </div>
                        </header>

                        {/* 2. DIE SCROLLBARE ZEITACHSE */}
                        <main className="relative z-10 px-4 pb-[300px]" style={{ paddingTop: '35vh' }}>
                            <div className="relative max-w-md mx-auto pt-8">
                                {/* Die Mittellinie */}
                                <div className="timeline-line"></div>

                                {tourStations.map((station, index) => {
                                    const isPast = index < currentStationIndex;
                                    const isCurrent = index === currentStationIndex;
                                    const isFuture = index > currentStationIndex;
                                    const isLeft = index % 2 === 0;

                                    return (
                                        <div key={station.id} className={`timeline-item ${isLeft ? 'left' : 'right'}`}>
                                            
                                            {/* Knotenpunkt in der Mitte */}
                                            <div className="absolute left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-black border-2 border-gray-800 flex items-center justify-center z-10">
                                                {isPast ? <div className="bg-green-500 w-full h-full rounded-full flex items-center justify-center"><IconCheck /></div> : <IconLock />}
                                            </div>

                                            {/* Die Kachel (Links oder Rechts) */}
                                            <div className="timeline-card-wrapper">
                                                <div className="bg-[#1C1C1E] border border-white/10 rounded-2xl p-4 flex flex-col items-center text-center shadow-xl">
                                                    <h2 className="text-white font-bold mb-2">
                                                        {isFuture ? `Station ${index + 1}` : station.name}
                                                    </h2>
                                                    
                                                    {isCurrent && currentDistance !== null && (
                                                        <div className="bg-gray-800 text-gray-300 text-xs px-3 py-1 rounded-full mb-3">
                                                            Noch {Math.round(currentDistance)}m
                                                        </div>
                                                    )}

                                                    <p className="text-gray-500 text-xs leading-snug">
                                                        {isPast ? "Erfolgreich abgeschlossen." : isCurrent ? "Gehe zum Ort, um den Inhalt freizuschalten." : "Noch gesperrt."}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </main>

                        {/* 3. DAS BOTTOM SHEET (Das Pop-up für Navigation & Action) */}
                        {sheetState !== 'hidden' && (
                            <div className="fixed bottom-0 left-0 w-full z-[100] slide-up">
                                <div className="bg-[#1C1C1E] border-t border-gray-800 rounded-t-3xl p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                                    <div className="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-6"></div>

                                    {/* STATE A: Navigation */}
                                    {sheetState === 'navigating' && currentStation && (
                                        <div>
                                            <h3 className="text-xl font-bold mb-1">Auf dem Weg zu: {currentStation.name}</h3>
                                            <p className="text-sm text-gray-400 mb-4 flex justify-between">
                                                <span>Bitte folge der Route.</span>
                                                <span className="text-iosBlue font-bold">{currentDistance ? Math.round(currentDistance) + 'm' : '...'}</span>
                                            </p>
                                            {userLoc && <MiniMap targetLat={currentStation.lat} targetLng={currentStation.lng} />}
                                        </div>
                                    )}

                                    {/* STATE B: Am Ort (Quiz oder Info) */}
                                    {sheetState === 'at_station' && currentStation && (
                                        <div>
                                            <h3 className="text-2xl font-bold text-white mb-4">Ziel erreicht!</h3>
                                            
                                            {sheetMode === 'quiz' && currentStation.hasQuiz && (
                                                <div className="space-y-4">
                                                    <p className="text-gray-300 font-medium">{currentStation.quiz?.question}</p>
                                                    <div className="space-y-2">
                                                        {currentStation.quiz?.answers.map((ans, idx) => (
                                                            <button key={idx} onClick={() => handleQuizAnswer(idx)} className="w-full bg-gray-800 hover:bg-gray-700 text-white p-3 rounded-xl text-left border border-gray-700 transition">
                                                                {ans}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {sheetMode === 'info' && (
                                                <div className="space-y-4">
                                                    {/* Media Einbindung (Bild) */}
                                                    {currentStation.mediaUrl && (
                                                        <img src={currentStation.mediaUrl} alt="Info" className="w-full h-48 object-cover rounded-xl border border-gray-700" />
                                                    )}
                                                    <div className="bg-gray-800/50 p-4 rounded-xl border border-gray-800">
                                                        <h4 className="font-bold text-sm text-iosBlue mb-2">Information</h4>
                                                        <p className="text-sm text-gray-300 leading-relaxed">{currentStation.infoText || currentStation.riddle || "Keine weiteren Infos hinterlegt."}</p>
                                                    </div>
                                                    <button onClick={handleNextStation} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl active:bg-blue-600 transition">
                                                        Weiter zur nächsten Station
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* STATE C: Fertig / Urkunde */}
                                    {sheetState === 'finished' && (
                                        <div className="text-center py-4">
                                            <h3 className="text-3xl font-bold text-white mb-2">Herzlichen Glückwunsch!</h3>
                                            <p className="text-gray-400 mb-6">Du hast die Tour abgeschlossen und <strong className="text-iosBlue">{score} Punkte</strong> gesammelt!</p>
                                            <button onClick={downloadCertificate} className="w-full bg-green-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 mb-3">
                                                Urkunde herunterladen (PDF)
                                            </button>
                                            <button onClick={() => changeView('player_tours')} className="w-full bg-gray-800 text-white font-bold py-4 rounded-xl">
                                                Zurück zur Übersicht
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // ... (Hier würde normal der Rest stehen: LoginView, ToursView. 
            // Um das Limit nicht zu sprengen und den Fokus auf das Redesign zu legen, 
            // ist hier der Dummy für die Touren-Auswahl, damit du direkt ins Spiel kommst)
            
            const PlayerToursView = () => (
                <div className="min-h-screen bg-black p-6 pt-12">
                    <h1 className="text-3xl font-bold text-white mb-8">Touren Übersicht</h1>
                    {tours.map(tour => (
                        <div key={tour.id} onClick={() => changeView('player_game', tour.id)} className="bg-darkCard p-6 rounded-2xl border border-gray-800 mb-4 cursor-pointer">
                            <h2 className="text-xl font-bold text-white">{tour.name}</h2>
                            <p className="text-gray-500 text-sm mt-1">Tippen zum Starten →</p>
                        </div>
                    ))}
                    {tours.length === 0 && <p className="text-gray-500">Noch keine Touren angelegt.</p>}
                </div>
            );

            if (view === 'loading') return <div className="min-h-screen bg-black text-white flex items-center justify-center">Laden...</div>;
            return (
                <div>
                    {view === 'player_tours' && <PlayerToursView />}
                    {view === 'player_game' && <PlayerGameView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
