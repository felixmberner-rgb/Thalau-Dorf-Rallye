<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dorfrallye Thalau</title>
    
    <!-- PWA & Apple Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { iosBlue: '#0A84FF', iosBg: '#000000', darkCard: '#1C1C1E' } } }
        }
    </script>

    <!-- Leaflet Map CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- jsPDF für die Urkunde -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .timeline-line { position: absolute; left: 50%; transform: translateX(-50%); width: 2px; background: #333; top: 0; bottom: 0; z-index: 0; }
        .timeline-item { width: 100%; display: flex; align-items: center; position: relative; margin-bottom: 40px; }
        .timeline-item.left { justify-content: flex-start; }
        .timeline-item.right { justify-content: flex-end; }
        .timeline-card-wrapper { width: 45%; }
        
        .leaflet-container { z-index: 1 !important; border-radius: 12px; }
        .text-shadow { text-shadow: 0px 2px 10px rgba(0,0,0,0.8); }

        /* Animationen für das Pop-up */
        .sheet-transition { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Der weiche Verlauf über der Zeitleiste */
        .fade-mask {
            position: fixed;
            top: 20vh; /* Header Höhe angepasst */
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            z-index: 40;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // FIREBASE CONFIG
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBpsE5x-nKFHk8fn_v85_1qseZaOXzGil0",
            authDomain: "dorf-rallye.firebaseapp.com",
            projectId: "dorf-rallye",
            storageBucket: "dorf-rallye.firebasestorage.app",
            messagingSenderId: "816087472841",
            appId: "1:816087472841:web:daacaf4554b37ce9a6cb18",
            measurementId: "G-M6E4P73X60"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ICONS ---
        const IconLock = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconChevronLeft = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-lg"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconChevronUp = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
        const IconChevronDown = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconPlay = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconClock = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconRuler = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3l-13.4 13.4a2 2 0 0 1-2.8 0l-2.8-2.8a2 2 0 0 1 0-2.8l13.4-13.4a2 2 0 0 1 2.8 0l2.8 2.8a2 2 0 0 1 0 2.8z"></path><path d="M14.5 5.5l4 4"></path><path d="M11.5 8.5l4 4"></path><path d="M8.5 11.5l4 4"></path><path d="M5.5 14.5l4 4"></path></svg>;
        const IconMountain = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3l4 8 5-5 5 15H2L8 3z"></path></svg>;
        const IconCoffee = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>;

        function App() {
            const [view, setView] = React.useState('loading'); 
            const [tours, setTours] = React.useState([]);
            const [allStations, setAllStations] = React.useState([]);
            const [activeTourId, setActiveTourId] = React.useState(null);

            React.useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (user) => {
                    if (view === 'loading') setView('player_tours');
                });
                return () => unsubAuth();
            }, [view]);

            React.useEffect(() => {
                const unsubTours = onSnapshot(collection(db, 'tours'), snap => setTours(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubStations = onSnapshot(collection(db, 'stations'), snap => setAllStations(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order)));
                return () => { unsubTours(); unsubStations(); };
            }, []);

            const changeView = (newView, tourId = null) => {
                setView(newView);
                if (tourId !== undefined) setActiveTourId(tourId);
            };

            // KOMPONENTE: Mini-Map (ohne Flimmern)
            const MiniMap = ({ targetLat, targetLng, userLoc, isExpanded }) => {
                const mapRef = React.useRef(null);
                const userMarkerRef = React.useRef(null);
                const targetMarkerRef = React.useRef(null);
                const polylineRef = React.useRef(null);

                React.useEffect(() => {
                    if (!userLoc || !targetLat || !targetLng) return;

                    // Init Map only once
                    if (!mapRef.current) {
                        // Dragging und TouchZoom wieder aktiviert
                        mapRef.current = L.map('mini-map', { zoomControl: false }).setView([userLoc.lat, userLoc.lng], 16);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapRef.current);
                        
                        userMarkerRef.current = L.circleMarker([userLoc.lat, userLoc.lng], { color: '#0A84FF', radius: 8, fillOpacity: 1 }).addTo(mapRef.current);
                        targetMarkerRef.current = L.marker([targetLat, targetLng]).addTo(mapRef.current);
                        polylineRef.current = L.polyline([[userLoc.lat, userLoc.lng], [targetLat, targetLng]], { color: '#0A84FF', weight: 4, dashArray: '10, 10' }).addTo(mapRef.current);
                    } else {
                        // Update existing elements smoothly
                        userMarkerRef.current.setLatLng([userLoc.lat, userLoc.lng]);
                        targetMarkerRef.current.setLatLng([targetLat, targetLng]);
                        polylineRef.current.setLatLngs([[userLoc.lat, userLoc.lng], [targetLat, targetLng]]);
                    }

                    // Adjust view bounds
                    if (mapRef.current && userLoc && targetLat && targetLng) {
                        mapRef.current.fitBounds([[userLoc.lat, userLoc.lng], [targetLat, targetLng]], { padding: [20, 20], maxZoom: 18 });
                    }
                }, [userLoc, targetLat, targetLng, isExpanded]); // Re-run bounds calculation when expanded state changes

                React.useEffect(() => {
                    // Fix für das "Blauer Kasten" Problem: 
                    // Sobald die CSS-Animation (0.3s) beendet ist, zwingen wir die Karte, ihre Kacheln neu zu laden.
                    if (mapRef.current) {
                        const timer = setTimeout(() => {
                            mapRef.current.invalidateSize();
                        }, 350); 
                        return () => clearTimeout(timer);
                    }
                }, [isExpanded]);

                return <div id="mini-map" className={`w-full bg-gray-800 rounded-xl transition-all duration-300 ${isExpanded ? 'h-64' : 'h-24'}`}></div>;
            };

            // ----------------------------------------------------------------
            // SPIELER: DAS HAUPTSPIEL
            // ----------------------------------------------------------------
            const PlayerGameView = () => {
                const [userLoc, setUserLoc] = React.useState(null);
                const [currentStationIndex, setCurrentStationIndex] = React.useState(0);
                const [score, setScore] = React.useState(0);
                const [sheetState, setSheetState] = React.useState('navigating'); 
                const [sheetMode, setSheetMode] = React.useState('quiz');
                const [sheetExpanded, setSheetExpanded] = React.useState(false);

                const activeTour = tours.find(t => t.id === activeTourId);
                const tourStations = allStations.filter(s => s.tourId === activeTourId);
                const currentStation = tourStations[currentStationIndex];

                React.useEffect(() => {
                    if (!("geolocation" in navigator)) return;
                    const watchId = navigator.geolocation.watchPosition(
                        (pos) => setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => console.log("GPS Fehler", err),
                        { enableHighAccuracy: true, maximumAge: 2000, timeout: 5000 }
                    );
                    return () => navigator.geolocation.clearWatch(watchId);
                }, []);

                const getDistance = (lat1, lon1, lat2, lon2) => {
                    if(!lat1 || !lon1 || !lat2 || !lon2) return null;
                    const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                    const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                    const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                };

                const currentDistance = currentStation && userLoc ? getDistance(userLoc.lat, userLoc.lng, currentStation.lat, currentStation.lng) : null;

                React.useEffect(() => {
                    if (sheetState === 'navigating' && currentDistance !== null && currentDistance <= 30) {
                        setSheetState('at_station');
                        setSheetMode(currentStation.hasQuiz ? 'quiz' : 'info');
                        setSheetExpanded(true); // Expand sheet when arriving
                    }
                }, [currentDistance, sheetState, currentStation]);

                const handleQuizAnswer = (selectedIndex) => {
                    if (selectedIndex === currentStation.quiz?.correctIndex) {
                        setScore(s => s + 100);
                    }
                    setSheetMode('info');
                };

                const handleNextStation = () => {
                    if (currentStationIndex + 1 < tourStations.length) {
                        setCurrentStationIndex(i => i + 1);
                        setSheetState('navigating');
                        setSheetExpanded(false); // Collapse for navigation
                    } else {
                        setSheetState('finished');
                        setSheetExpanded(true);
                    }
                };

                const downloadCertificate = () => {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: "landscape" });
                    doc.setFillColor(242, 242, 247); doc.rect(0, 0, 300, 210, 'F');
                    doc.setTextColor(10, 132, 255); doc.setFontSize(40); doc.text("Urkunde", 148, 50, null, null, "center");
                    doc.setTextColor(0, 0, 0); doc.setFontSize(20); doc.text(`Für die erfolgreiche Teilnahme an der`, 148, 80, null, null, "center");
                    doc.setFontSize(26); doc.text(`"${activeTour?.name || 'Dorfrallye'}"`, 148, 100, null, null, "center");
                    doc.setFontSize(18); doc.text(`Erreichte Punktzahl: ${score} Punkte`, 148, 140, null, null, "center");
                    doc.setFontSize(12); doc.setTextColor(100, 100, 100); doc.text(`Ausgestellt am: ${new Date().toLocaleDateString('de-DE')}`, 148, 180, null, null, "center");
                    doc.save("Dorfrallye_Urkunde.pdf");
                };

                const toggleSheet = () => {
                    if (sheetState === 'navigating') {
                        setSheetExpanded(!sheetExpanded);
                    }
                };

                return (
                    <div className="min-h-screen bg-black relative">
                        
                        {/* HEADER - Kleiner, fixiert */}
                        <header className="fixed top-0 left-0 w-full h-[20vh] z-50">
                            <img src={activeTour?.imageUrl || "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG"} 
                                 className="absolute inset-0 w-full h-full object-cover" alt="Hintergrund" />
                            <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-black/60 to-black/90"></div>
                            
                            <button onClick={()=>changeView('player_tours')} className="absolute top-12 left-4 p-2 z-50 bg-black/30 rounded-full backdrop-blur-md">
                                <IconChevronLeft />
                            </button>

                            <div className="absolute bottom-4 left-0 w-full flex flex-col items-center justify-center px-6">
                                <h1 className="text-3xl md:text-4xl font-bold text-white text-center leading-tight text-shadow">
                                    {activeTour?.name || "Historische Tour"}
                                </h1>
                                <div className="mt-2 px-3 py-1 rounded-full border border-green-500/50 bg-green-900/40 text-green-400 text-[10px] font-bold uppercase tracking-widest backdrop-blur-sm">
                                    {userLoc ? "GPS AKTIV" : "SUCHE GPS..."}
                                </div>
                            </div>
                        </header>

                        {/* FADE MASK - Macht den Übergang weich */}
                        <div className="fade-mask"></div>

                        {/* ZEITACHSE */}
                        <main className="relative z-10 px-4 pb-[120px]" style={{ paddingTop: '23vh' }}>
                            <div className="relative max-w-md mx-auto pt-4">
                                <div className="timeline-line"></div>

                                {tourStations.map((station, index) => {
                                    const isPast = index < currentStationIndex;
                                    const isCurrent = index === currentStationIndex;
                                    const isFuture = index > currentStationIndex;
                                    const isLeft = index % 2 === 0;
                                    
                                    // Zeige den echten Namen für vergangene und die aktuelle Station, sonst "Station X"
                                    const displayName = isFuture ? `Station ${index + 1}` : station.name;

                                    return (
                                        <div key={station.id} className={`timeline-item ${isLeft ? 'left' : 'right'}`}>
                                            <div className="absolute left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-black border-2 border-gray-800 flex items-center justify-center z-10">
                                                {isPast ? <div className="bg-green-500 w-full h-full rounded-full flex items-center justify-center"><IconCheck /></div> : <IconLock />}
                                            </div>

                                            <div className="timeline-card-wrapper">
                                                <div className={`p-4 flex flex-col items-center text-center shadow-xl rounded-2xl border transition-colors ${isCurrent ? 'bg-darkCard border-iosBlue/50' : 'bg-black border-white/10'}`}>
                                                    <h2 className="text-white font-bold mb-2 text-sm md:text-base break-words w-full">
                                                        {displayName}
                                                    </h2>
                                                    
                                                    {isCurrent && currentDistance !== null && (
                                                        <div className="bg-gray-800 text-iosBlue font-medium text-xs px-3 py-1 rounded-full mb-3">
                                                            Noch {Math.round(currentDistance)}m
                                                        </div>
                                                    )}

                                                    <p className="text-gray-500 text-[10px] md:text-xs leading-snug">
                                                        {isPast ? "Erfolgreich abgeschlossen." : isCurrent ? "Finde diesen Ort, um weiterzukommen." : "Noch gesperrt."}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </main>

                        {/* BOTTOM SHEET - Interaktiv */}
                        {sheetState !== 'hidden' && (
                            <div className={`fixed bottom-0 left-0 w-full z-[100] bg-[#1C1C1E] border-t border-gray-800 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.8)] sheet-transition`}
                                 style={{ transform: `translateY(${sheetState === 'navigating' && !sheetExpanded ? '10%' : '0'})` }}>
                                
                                {/* Handle - Klickbar machen */}
                                <div className="w-full pt-4 pb-2 flex justify-center cursor-pointer" onClick={toggleSheet}>
                                    <div className="w-12 h-1.5 bg-gray-600 rounded-full"></div>
                                    {sheetState === 'navigating' && (
                                       <div className="absolute top-2 right-4 text-gray-500">
                                           {sheetExpanded ? <IconChevronDown /> : <IconChevronUp />}
                                       </div>
                                    )}
                                </div>

                                <div className="px-6 pb-8 pt-2">
                                    {/* STATE A: Navigation */}
                                    {sheetState === 'navigating' && currentStation && (
                                        <div>
                                            <div className="flex justify-between items-end mb-4">
                                                <div>
                                                    <p className="text-gray-400 text-xs font-medium uppercase tracking-wider mb-1">Nächstes Ziel</p>
                                                    <h3 className="text-xl font-bold text-white">{currentStation.name}</h3>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-2xl font-bold text-iosBlue">{currentDistance ? Math.round(currentDistance) + 'm' : '...'}</span>
                                                </div>
                                            </div>
                                            
                                            <MiniMap targetLat={currentStation.lat} targetLng={currentStation.lng} userLoc={userLoc} isExpanded={sheetExpanded} />
                                            
                                            {sheetExpanded && (
                                                <p className="text-center text-xs text-gray-500 mt-4">Bewege dich in Richtung des blauen Markers.</p>
                                            )}
                                        </div>
                                    )}

                                    {/* STATE B: Am Ort (Quiz oder Info) */}
                                    {sheetState === 'at_station' && currentStation && (
                                        <div className="animate-[slideUp_0.3s_ease-out]">
                                            <h3 className="text-2xl font-bold text-green-400 mb-4 flex items-center gap-2"><IconCheck /> Ziel erreicht!</h3>
                                            
                                            {sheetMode === 'quiz' && currentStation.hasQuiz && (
                                                <div className="space-y-4">
                                                    <p className="text-white font-medium text-lg">{currentStation.quiz?.question}</p>
                                                    <div className="space-y-2">
                                                        {currentStation.quiz?.answers.map((ans, idx) => (
                                                            <button key={idx} onClick={() => handleQuizAnswer(idx)} className="w-full bg-gray-800 hover:bg-gray-700 text-white p-4 rounded-xl text-left border border-gray-700 transition active:bg-gray-600">
                                                                {ans}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {sheetMode === 'info' && (
                                                <div className="space-y-4">
                                                    {currentStation.mediaUrl && (
                                                        <img src={currentStation.mediaUrl} alt="Info" className="w-full h-48 object-cover rounded-xl border border-gray-700" />
                                                    )}
                                                    <div className="bg-black/30 p-4 rounded-xl border border-gray-800">
                                                        <h4 className="font-bold text-sm text-iosBlue mb-2">Information</h4>
                                                        <p className="text-sm text-gray-300 leading-relaxed">{currentStation.infoText || currentStation.riddle}</p>
                                                    </div>
                                                    <button onClick={handleNextStation} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl active:bg-blue-600 transition">
                                                        Weiter zur nächsten Station
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* STATE C: Fertig */}
                                    {sheetState === 'finished' && (
                                        <div className="text-center py-4">
                                            <h3 className="text-3xl font-bold text-white mb-2">Glückwunsch!</h3>
                                            <p className="text-gray-400 mb-6">Du hast die Rallye gemeistert und <strong className="text-iosBlue">{score} Punkte</strong> erzielt.</p>
                                            <button onClick={downloadCertificate} className="w-full bg-green-600 text-white font-bold py-4 rounded-xl mb-3 active:bg-green-700 transition">
                                                Urkunde herunterladen (PDF)
                                            </button>
                                            <button onClick={() => changeView('player_tours')} className="w-full bg-gray-800 text-white font-bold py-4 rounded-xl active:bg-gray-700 transition">
                                                Zurück zur Übersicht
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // ----------------------------------------------------------------
            // SPIELER: TOUREN ÜBERSICHT (Wieder mit schönen Kacheln & Infos)
            // ----------------------------------------------------------------
            const PlayerToursView = () => (
                <div className="min-h-screen bg-black">
                    <header className="fixed top-0 left-0 w-full h-[20vh] z-40 bg-black/80 backdrop-blur-md flex items-end pb-6 border-b border-gray-800">
                        <div className="px-6 w-full">
                            <h1 className="text-3xl md:text-4xl font-bold text-white tracking-tight">Thalau Entdecken</h1>
                        </div>
                    </header>
                    
                    <div className="fade-mask" style={{top: '20vh'}}></div>

                    <div className="px-6 pb-24 relative z-10" style={{ paddingTop: '24vh' }}>
                        <div className="space-y-6 max-w-md mx-auto">
                            {tours.map(tour => (
                                <div key={tour.id} onClick={() => changeView('player_game', tour.id)} className="group cursor-pointer rounded-3xl overflow-hidden bg-darkCard border border-gray-800 relative shadow-2xl transition transform active:scale-[0.98]">
                                    
                                    {/* Hintergrundbild der Kachel */}
                                    <div className="h-48 w-full relative">
                                        {tour.imageUrl ? (
                                            <img src={tour.imageUrl} alt={tour.name} className="w-full h-full object-cover transition duration-500 group-hover:scale-105" />
                                        ) : (
                                            <div className="w-full h-full bg-gradient-to-br from-gray-700 to-gray-900"></div>
                                        )}
                                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
                                    </div>

                                    {/* Content */}
                                    <div className="p-5 absolute bottom-0 w-full">
                                        <h2 className="text-2xl font-bold text-white mb-2 leading-tight">{tour.name}</h2>
                                        
                                        {tour.description && <p className="text-sm text-gray-300 mb-4 line-clamp-2">{tour.description}</p>}

                                        {/* Badges für Infos */}
                                        <div className="flex flex-wrap gap-2">
                                            {tour.length && (
                                                <span className="flex items-center gap-1 bg-white/10 backdrop-blur-md px-2.5 py-1 rounded-md text-xs font-medium text-gray-200">
                                                    <IconRuler /> {tour.length}
                                                </span>
                                            )}
                                            {tour.duration && (
                                                <span className="flex items-center gap-1 bg-white/10 backdrop-blur-md px-2.5 py-1 rounded-md text-xs font-medium text-gray-200">
                                                    <IconClock /> {tour.duration}
                                                </span>
                                            )}
                                            {tour.elevation && (
                                                <span className="flex items-center gap-1 bg-white/10 backdrop-blur-md px-2.5 py-1 rounded-md text-xs font-medium text-gray-200">
                                                    <IconMountain /> {tour.elevation}
                                                </span>
                                            )}
                                        </div>
                                        {tour.refreshments && (
                                            <div className="mt-2 text-xs text-orange-400 font-medium flex items-center gap-1">
                                                <IconCoffee /> Einkehr: {tour.refreshments}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {tours.length === 0 && <p className="text-gray-500 text-center mt-10">Noch keine Touren angelegt.</p>}
                        </div>
                    </div>
                </div>
            );

            if (view === 'loading') return <div className="min-h-screen bg-black text-white flex items-center justify-center">Laden...</div>;
            return (
                <div>
                    {view === 'player_tours' && <PlayerToursView />}
                    {view === 'player_game' && <PlayerGameView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
