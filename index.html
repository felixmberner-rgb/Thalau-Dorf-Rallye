                }, [mode, tourStations, segmentId]);

                React.useEffect(() => {
                    if (mode === 'route') {
                        if (segmentId === 'return') {
                            setTourPath(activeTour?.returnPath || []);
                        } else {
                            const st = tourStations.find(s => s.id === segmentId);
                            setTourPath(st?.path || []);
                        }
                    }
                }, [segmentId, mode, activeTour, tourStations]);

                const loadStationData = (st) => {
                    setEditingId(st.id);
                    setStData({
                        name: st.name||'', lat: st.lat||'', lng: st.lng||'', infoText: st.infoText||'', mediaUrl: st.mediaUrl||'',
                        hasQuiz: st.hasQuiz||false, quizType: st.quizType || 'choice',
                        quiz: { ...defaultQuiz, ...st.quiz }
                    });
                    setMode('station');
                    setShowForm(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    if(mapRef.current && st.lat && st.lng) {
                        if(markerRef.current) mapRef.current.removeLayer(markerRef.current);
                        markerRef.current = L.marker([st.lat, st.lng]).addTo(mapRef.current);
                        mapRef.current.setView([st.lat, st.lng], 16);
                    }
                };

                const resetForm = () => {
                    setEditingId(null);
                    setStData({ name: '', lat: '', lng: '', infoText: '', mediaUrl: '', hasQuiz: false, quizType: 'choice', quiz: defaultQuiz });
                    setShowForm(false);
                    if(markerRef.current && mapRef.current) mapRef.current.removeLayer(markerRef.current);
                };

                React.useEffect(() => {
                    if (!mapRef.current && containerRef.current) {
                        const map = L.map(containerRef.current).setView([50.418, 9.757], 14); 
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        
                        map.on('click', function(e) {
                            if (window.currentMode === 'route') {
                                setTourPath(prev => {
                                    const newPath = [...prev, {lat: e.latlng.lat, lng: e.latlng.lng}];
                                    if(polylineRef.current) map.removeLayer(polylineRef.current);
                                    polylineRef.current = L.polyline(newPath, {color: 'blue', weight: 4}).addTo(map);
                                    return newPath;
                                });
                            } else {
                                setStData(prev => ({...prev, lat: e.latlng.lat.toFixed(6), lng: e.latlng.lng.toFixed(6)}));
                                if(markerRef.current) map.removeLayer(markerRef.current);
                                markerRef.current = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
                            }
                        });
                        mapRef.current = map;

                        const ro = new ResizeObserver(() => map.invalidateSize());
                        ro.observe(containerRef.current);
                    }
                }, []);

                React.useEffect(() => {
                    if (mapRef.current && showMap) {
                        setTimeout(() => mapRef.current.invalidateSize(), 100);
                    }
                }, [showMap]);

                React.useEffect(() => {
                    if(mapRef.current && mode === 'route') {
                        if(polylineRef.current) mapRef.current.removeLayer(polylineRef.current);
                        if(tourPath.length > 0) polylineRef.current = L.polyline(tourPath, {color: 'blue', weight: 4}).addTo(mapRef.current);
                    }
                }, [mode, tourPath]);

                React.useEffect(() => { window.currentMode = mode; }, [mode]);

                const saveStation = async (e) => {
                    e.preventDefault();
                    if(!stData.lat) return alert("Klick auf die Karte, um den Ort zu markieren!");
                    const payload = { ...stData, tourId: activeTourId };
                    if (editingId) {
                        await updateDoc(doc(db, 'stations', editingId), payload);
                        showToast("Station aktualisiert!");
                    } else {
                        await addDoc(collection(db, 'stations'), { ...payload, order: Date.now() });
                        showToast("Station hinzugefügt!");
                    }
                    resetForm();
                };

                const moveStation = async (index, direction) => {
                    if (index + direction < 0 || index + direction >= tourStations.length) return;
                    const st1 = tourStations[index];
                    const st2 = tourStations[index + direction];
                    const tempOrder = st1.order;
                    await updateDoc(doc(db, 'stations', st1.id), { order: st2.order });
                    await updateDoc(doc(db, 'stations', st2.id), { order: tempOrder });
                };

                const safePaddingStyle = { paddingTop: 'calc(env(safe-area-inset-top) + 2rem)' };

                return (
                    <div className="min-h-screen bg-gray-900 px-8 pb-24 text-white" style={safePaddingStyle}>
                        <button onClick={() => setView('admin_tours')} className="text-iosBlue mb-4 flex items-center"><IconChevronLeft /> Zurück</button>
                        <h2 className="text-2xl font-bold mb-6">Management: {activeTour?.name}</h2>

                        <div className="bg-darkCard p-6 rounded-3xl mb-8">
                            <div className="flex gap-2 mb-4 bg-gray-800 p-1 rounded-xl">
                                <button onClick={()=>{setMode('station'); setShowForm(false);}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition ${mode === 'station' ? 'bg-iosBlue text-white' : 'text-gray-400'}`}>Stationen</button>
                                <button onClick={()=>{setMode('route'); setShowForm(false);}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition ${mode === 'route' ? 'bg-green-600 text-white' : 'text-gray-400'}`}>Wegverlauf</button>
                            </div>

                            <div className={`mb-4 ${showMap ? 'block' : 'hidden'}`}>
                                <p className="text-xs text-gray-400 mb-2">{mode === 'route' ? 'Wähle einen Abschnitt aus dem Menü und klicke auf die Karte, um den Weg zu zeichnen.' : 'Klicke auf die Karte, um den Standort der Station zu markieren.'}</p>
                                <div ref={containerRef} className="h-64 w-full rounded-2xl bg-gray-200"></div>
                            </div>
                            
                            {mode === 'route' && (
                                <div className="space-y-3">
                                    <select value={segmentId} onChange={e => setSegmentId(e.target.value)} className="w-full p-3 rounded-xl text-black font-medium mb-2">
                                        {tourStations.map((st, idx) => (
                                            <option key={st.id} value={st.id}>
                                                {idx === 0 ? 'Startpunkt' : tourStations[idx-1].name} ➔ {st.name}
                                            </option>
                                        ))}
                                        {activeTour?.returnToParking && (
                                            <option value="return">Letzte Station ➔ Parkplatz (Rückweg)</option>
                                        )}
                                    </select>
                                    <div className="flex gap-2">
                                        <button onClick={() => { setTourPath([]); if(polylineRef.current) mapRef.current.removeLayer(polylineRef.current); }} className="w-1/3 bg-red-900/50 text-red-500 font-bold py-3 rounded-xl">Löschen</button>
                                        <button onClick={async () => { 
                                            if (segmentId === 'return') {
                                                await updateDoc(doc(db, 'tours', activeTourId), { returnPath: tourPath });
                                            } else {
                                                await updateDoc(doc(db, 'stations', segmentId), { path: tourPath });
                                            }
                                            showToast("Abschnitt gespeichert!"); 
                                        }} className="w-2/3 bg-green-600 font-bold text-white py-3 rounded-xl">Abschnitt Speichern</button>
                                    </div>
                                </div>
                            )}

                            {mode === 'station' && !showForm && (
                                <button onClick={() => setShowForm(true)} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl shadow-lg">+ Neue Station anlegen</button>
                            )}

                            {mode === 'station' && showForm && (
                                <form onSubmit={saveStation} className="space-y-4">
                                    <h3 className="font-bold">{editingId ? 'Station bearbeiten' : 'Neue Station'}</h3>
                                    <div className="flex gap-2">
                                        <input type="text" value={stData.lat} readOnly placeholder="Lat" className="w-1/2 p-3 rounded-xl bg-gray-800 text-gray-400" />
                                        <input type="text" value={stData.lng} readOnly placeholder="Lng" className="w-1/2 p-3 rounded-xl bg-gray-800 text-gray-400" />
                                    </div>
                                    <input type="text" value={stData.name} onChange={e=>setStData({...stData, name: e.target.value})} placeholder="Stationsname" className="w-full p-3 rounded-xl text-black" required />
                                    
                                    <div className="bg-gray-800 p-4 rounded-xl space-y-4 border border-gray-700">
                                        <label className="flex items-center space-x-2 text-white font-bold"><input type="checkbox" checked={stData.hasQuiz} onChange={e=>setStData({...stData, hasQuiz: e.target.checked})} className="w-5 h-5 rounded" /><span>Rätsel / Quiz aktivieren</span></label>
                                        
                                        {stData.hasQuiz && (
                                            <div className="space-y-4 border-t border-gray-700 pt-4">
                                                <select value={stData.quizType} onChange={e=>setStData({...stData, quizType: e.target.value})} className="w-full p-3 rounded-xl text-black font-medium">
                                                    <option value="choice">Multiple Choice (4 Optionen)</option>
                                                    <option value="number">Zahleneingabe (Exakt)</option>
                                                    <option value="slider">Zahlenstrahl (Schieberegler)</option>
                                                    <option value="order">Reihenfolge Sortieren (4 Elemente)</option>
                                                </select>

                                                <input type="text" value={stData.quiz.question} onChange={e=>setStData({...stData, quiz: {...stData.quiz, question: e.target.value}})} placeholder="Fragestellung" className="w-full p-3 rounded text-black" />
                                                
                                                {stData.quizType === 'choice' && stData.quiz.answers.map((ans, idx) => (
                                                    <div key={idx} className="flex gap-2 items-center">
                                                        <input type="radio" name="corr" checked={stData.quiz.correctIndex === idx} onChange={()=>setStData({...stData, quiz: {...stData.quiz, correctIndex: idx}})} className="w-5 h-5" />
                                                        <input type="text" value={ans} onChange={e=>{ const newAns = [...stData.quiz.answers]; newAns[idx] = e.target.value; setStData({...stData, quiz: {...stData.quiz, answers: newAns}}); }} placeholder={`Antwortmöglichkeit ${idx+1}`} className="flex-1 p-2 rounded text-black" />
                                                    </div>
                                                ))}

                                                {stData.quizType === 'number' && (
                                                    <div><label className="text-xs text-gray-400">Korrekte Lösungszahl:</label><input type="number" value={stData.quiz.correctNumber} onChange={e=>setStData({...stData, quiz: {...stData.quiz, correctNumber: parseInt(e.target.value)}})} className="w-full p-3 rounded text-black mt-1" /></div>
                                                )}

                                                {stData.quizType === 'slider' && (
                                                    <div className="space-y-2">
                                                        <div className="flex gap-2">
                                                            <div className="w-1/2"><label className="text-xs text-gray-400">Minimum</label><input type="number" value={stData.quiz.sliderMin} onChange={e=>setStData({...stData, quiz: {...stData.quiz, sliderMin: parseInt(e.target.value)}})} className="w-full p-2 rounded text-black" /></div>
                                                            <div className="w-1/2"><label className="text-xs text-gray-400">Maximum</label><input type="number" value={stData.quiz.sliderMax} onChange={e=>setStData({...stData, quiz: {...stData.quiz, sliderMax: parseInt(e.target.value)}})} className="w-full p-2 rounded text-black" /></div>
                                                        </div>
                                                        <div><label className="text-xs text-gray-400 text-iosBlue font-bold">Korrekter Wert (Lösung)</label><input type="number" value={stData.quiz.sliderCorrect} onChange={e=>setStData({...stData, quiz: {...stData.quiz, sliderCorrect: parseInt(e.target.value)}})} className="w-full p-2 rounded text-black" /></div>
                                                    </div>
                                                )}

                                                {stData.quizType === 'order' && (
                                                    <div className="space-y-2">
                                                        <p className="text-xs text-gray-400">Gib die Elemente hier in der <b>richtigen</b> Reihenfolge ein. Beim Spieler werden sie gemischt angezeigt.</p>
                                                        {stData.quiz.orderItems.map((item, idx) => (
                                                            <div key={idx} className="flex gap-2 items-center">
                                                                <span className="text-gray-500 w-4">{idx+1}.</span>
                                                                <input type="text" value={item} onChange={e=>{ const newItems = [...stData.quiz.orderItems]; newItems[idx] = e.target.value; setStData({...stData, quiz: {...stData.quiz, orderItems: newItems}}); }} placeholder={`Element ${idx+1}`} className="flex-1 p-2 rounded text-black" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <textarea value={stData.infoText} onChange={e=>setStData({...stData, infoText: e.target.value})} placeholder="Informationstext (Auflösung bei Station)" className="w-full p-3 rounded-xl text-black h-24" />
                                    <input type="url" value={stData.mediaUrl} onChange={e=>setStData({...stData, mediaUrl: e.target.value})} placeholder="Bild/Video URL (Optional)" className="w-full p-3 rounded-xl text-black" />
                                    
                                    <div className="flex gap-2">
                                        <button type="button" onClick={resetForm} className="bg-gray-700 px-4 rounded-xl">Abbrechen</button>
                                        <button type="submit" className="flex-1 bg-iosBlue text-white font-bold py-3 rounded-xl">{editingId ? 'Speichern' : 'Hinzufügen'}</button>
                                    </div>
                                </form>
                            )}
                        </div>

                        {mode === 'station' && (
                            <div className="space-y-3">
                                {tourStations.map((st, idx) => (
                                    <div key={st.id} className="bg-darkCard p-4 rounded-2xl flex justify-between items-center border border-gray-800">
                                        <div className="flex items-center gap-3">
                                            <div className="flex flex-col gap-1 mr-1">
                                                <button onClick={()=>moveStation(idx, -1)} className={`p-1 bg-gray-800 hover:bg-gray-700 rounded transition ${idx === 0 ? 'opacity-30 pointer-events-none' : ''}`}><IconChevronUp /></button>
                                                <button onClick={()=>moveStation(idx, 1)} className={`p-1 bg-gray-800 hover:bg-gray-700 rounded transition ${idx === tourStations.length-1 ? 'opacity-30 pointer-events-none' : ''}`}><IconChevronDown /></button>
                                            </div>
                                            <span className="font-bold">{idx+1}. {st.name}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => loadStationData(st)} className="p-2 bg-gray-800 rounded-lg"><IconEdit /></button>
                                            <button onClick={() => {if(window.confirm('Löschen?')) deleteDoc(doc(db, 'stations', st.id));}} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><IconTrash /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            const AdminSettingsView = () => {
                const [video, setVideo] = React.useState(appSettings.bgVideoUrl || '');
                const [bgImg, setBgImg] = React.useState(appSettings.bgImageUrl || '');
                const [imp, setImp] = React.useState(appSettings.impressumUrl || '');
                const [dat, setDat] = React.useState(appSettings.datenschutzUrl || '');
                const [qChoice, setQChoice] = React.useState(appSettings.quizInfo_choice || '');
                const [qNumber, setQNumber] = React.useState(appSettings.quizInfo_number || '');
                const [qSlider, setQSlider] = React.useState(appSettings.quizInfo_slider || '');
                const [qOrder, setQOrder] = React.useState(appSettings.quizInfo_order || '');
                
                const [pwaIos, setPwaIos] = React.useState(appSettings.pwaPromptIos || '');
                const [pwaAndroid, setPwaAndroid] = React.useState(appSettings.pwaPromptAndroid || '');
                
                const [finalText, setFinalText] = React.useState(appSettings.finalText || '');
                const [donationUrl, setDonationUrl] = React.useState(appSettings.donationUrl || '');
                const [donText, setDonText] = React.useState(appSettings.donationText || '');

                const saveSettings = async (e) => {
                    e.preventDefault();
                    try {
                        await setDoc(doc(db, 'settings', 'global'), { 
                            bgVideoUrl: video, bgImageUrl: bgImg, impressumUrl: imp, datenschutzUrl: dat,
                            quizInfo_choice: qChoice, quizInfo_number: qNumber, quizInfo_slider: qSlider, quizInfo_order: qOrder,
                            pwaPromptIos: pwaIos, pwaPromptAndroid: pwaAndroid,
                            finalText: finalText, donationUrl: donationUrl, donationText: donText
                        }, { merge: true });
                        showToast("Einstellungen gespeichert!");
                    } catch(err) {
                        alert("Firebase Permission Error: Bitte checke die Regeln.");
                    }
                };

                const safePaddingStyle = { paddingTop: 'calc(env(safe-area-inset-top) + 2rem)' };

                return (
                    <div className="min-h-screen bg-gray-900 px-8 pb-20 text-white" style={safePaddingStyle}>
                        <button onClick={() => setView('admin_tours')} className="text-iosBlue mb-6 flex items-center"><IconChevronLeft /> Zurück</button>
                        <h2 className="text-3xl font-bold mb-8">Globale Einstellungen</h2>
                        <form onSubmit={saveSettings} className="bg-darkCard p-6 rounded-3xl space-y-4">
                            <div><label className="text-sm text-gray-400">Startseiten Video (MP4 oder YouTube URL)</label><input type="url" value={video} onChange={e=>setVideo(e.target.value)} className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Startseiten Bild (Alternativ zum Video)</label><input type="url" value={bgImg} onChange={e=>setBgImg(e.target.value)} className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Impressum Link</label><input type="url" value={imp} onChange={e=>setImp(e.target.value)} className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Datenschutz Link</label><input type="url" value={dat} onChange={e=>setDat(e.target.value)} className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            
                            <hr className="border-gray-700 my-6" />
                            <h4 className="font-bold text-gray-300">Abschluss & Urkunde</h4>
                            <div><label className="text-sm text-gray-400">Schlusstext nach der Tour</label><textarea value={finalText} onChange={e=>setFinalText(e.target.value)} placeholder="Danke fürs Mitmachen..." className="w-full p-3 rounded-xl text-black mt-1 h-24" /></div>
                            <div><label className="text-sm text-gray-400">Spenden Link (Optional)</label><input type="url" value={donationUrl} onChange={e=>setDonationUrl(e.target.value)} placeholder="https://paypal.me/..." className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Text für Spenden-Button</label><input type="text" value={donText} onChange={e=>setDonText(e.target.value)} placeholder="Kleine Spende hinterlassen ☕" className="w-full p-3 rounded-xl text-black mt-1" /></div>

                            <hr className="border-gray-700 my-6" />
                            <h4 className="font-bold text-gray-300">Quiz Hilfetexte (i-Icon)</h4>
                            <div><label className="text-sm text-gray-400">Multiple Choice Erklärung</label><textarea value={qChoice} onChange={e=>setQChoice(e.target.value)} placeholder="Wird ein Standardtext genutzt, wenn leer gelassen." className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Zahleneingabe Erklärung</label><textarea value={qNumber} onChange={e=>setQNumber(e.target.value)} placeholder="Wird ein Standardtext genutzt, wenn leer gelassen." className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Schieberegler Erklärung</label><textarea value={qSlider} onChange={e=>setQSlider(e.target.value)} placeholder="Wird ein Standardtext genutzt, wenn leer gelassen." className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Reihenfolge Erklärung</label><textarea value={qOrder} onChange={e=>setQOrder(e.target.value)} placeholder="Wird ein Standardtext genutzt, wenn leer gelassen." className="w-full p-3 rounded-xl text-black mt-1" /></div>

                            <hr className="border-gray-700 my-6" />
                            <h4 className="font-bold text-gray-300">App-Installations Meldung</h4>
                            <div><label className="text-sm text-gray-400">Anleitung iOS (iPhone/iPad)</label><textarea value={pwaIos} onChange={e=>setPwaIos(e.target.value)} placeholder="Standardtext wird verwendet, wenn leer" className="w-full p-3 rounded-xl text-black mt-1" /></div>
                            <div><label className="text-sm text-gray-400">Anleitung Android</label><textarea value={pwaAndroid} onChange={e=>setPwaAndroid(e.target.value)} placeholder="Standardtext wird verwendet, wenn leer" className="w-full p-3 rounded-xl text-black mt-1" /></div>

                            <button type="submit" className="w-full bg-iosBlue py-4 rounded-xl font-bold shadow-lg mt-4">Speichern</button>
                        </form>
                    </div>
                );
            };

            const Toast = () => toast ? <div className="fixed top-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[200]">{toast}</div> : null;

            if (isDesktop && !view.includes('admin') && view !== 'login') {
                return <DesktopView />;
            }

            return (
                <div>
                    {view === 'player_tours' && <PlayerToursView />}
                    {view === 'player_game' && <PlayerGameView />}
                    {view === 'login' && <LoginView />}
                    {view === 'admin_tours' && <AdminToursView />}
                    {view === 'admin_stations' && <AdminStationsView />}
                    {view === 'admin_settings' && <AdminSettingsView />}
                    
                    <PwaPromptModal />
                    <Toast />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
