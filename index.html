<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dorfrallye Thalau</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <!-- Apple Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Android Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Normales Browser Favicon (Tab-Icon am PC) -->
    <link rel="icon" type="image/png" href="icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { iosBlue: '#0A84FF', iosBg: '#000000', darkCard: '#1C1C1E' } } } }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .timeline-line { position: absolute; left: 50%; transform: translateX(-50%); width: 2px; background: #333; top: -100vh; bottom: 0; z-index: 0; }
        .timeline-item { width: 100%; display: flex; align-items: center; position: relative; margin-bottom: 40px; }
        .timeline-item.left { justify-content: flex-start; }
        .timeline-item.right { justify-content: flex-end; }
        .timeline-card-wrapper { width: 45%; cursor: pointer; }
        
        .leaflet-container { z-index: 1 !important; border-radius: 12px; }
        .leaflet-control-attribution { display: none; }
        .text-shadow { text-shadow: 0px 2px 8px rgba(0,0,0,0.8); }

        .sheet-transition { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-mask { position: fixed; top: 25vh; left: 0; width: 100%; height: 50px; background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%); z-index: 40; pointer-events: none; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #0A84FF; cursor: pointer; margin-top: -10px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpsE5x-nKFHk8fn_v85_1qseZaOXzGil0",
            authDomain: "dorf-rallye.firebaseapp.com",
            projectId: "dorf-rallye",
            storageBucket: "dorf-rallye.firebasestorage.app",
            messagingSenderId: "816087472841",
            appId: "1:816087472841:web:daacaf4554b37ce9a6cb18"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Icons
        const IconLock = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconChevronLeft = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconChevronUp = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
        const IconChevronDown = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconSettings = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconInfo = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconClock = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconRoute = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="19" r="3"></circle><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"></path><circle cx="18" cy="5" r="3"></circle></svg>;
        const IconMountain = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3l4 8 5-5 5 15H2L8 3z"></path></svg>;
        const IconEdit = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

        function App() {
            // Caching: Direkt den State aus dem LocalStorage holen für sofortigen Start!
            const [view, setView] = React.useState('player_tours'); 
            const [tours, setTours] = React.useState(() => {
                const cached = localStorage.getItem('cached_tours');
                return cached ? JSON.parse(cached) : [];
            });
            const [allStations, setAllStations] = React.useState([]);
            const [activeTourId, setActiveTourId] = React.useState(null);
            const [adminUser, setAdminUser] = React.useState(null);
            const [appSettings, setAppSettings] = React.useState({ bgVideoUrl: '', bgImageUrl: '', impressumUrl: '', datenschutzUrl: '', quizInfo_choice: '', quizInfo_number: '', quizInfo_slider: '', quizInfo_order: '', pwaPromptIos: '', pwaPromptAndroid: '', finalText: '', donationUrl: '', donationText: '' });
            const [toast, setToast] = React.useState(null);
            const [isDesktop, setIsDesktop] = React.useState(false);
            const [showPwaPrompt, setShowPwaPrompt] = React.useState(false);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const getYouTubeId = (url) => {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                const match = url?.match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            };

            React.useEffect(() => {
                const checkDesktop = () => setIsDesktop(window.innerWidth > 800);
                checkDesktop();
                window.addEventListener('resize', checkDesktop);
                return () => window.removeEventListener('resize', checkDesktop);
            }, []);

            React.useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (user) => {
                    setAdminUser(user);
                });
                return () => unsubAuth();
            }, []);
            
            // PWA Check: Nur auf Mobilgeräten anzeigen!
            React.useEffect(() => {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
                const hasSeenPrompt = localStorage.getItem('pwaPromptSeen');
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                if (!isStandalone && !hasSeenPrompt && isMobile) {
                    setShowPwaPrompt(true);
                }
            }, []);

            React.useEffect(() => {
                const unsubTours = onSnapshot(collection(db, 'tours'), snap => {
                    const fetchedTours = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setTours(fetchedTours);
                    localStorage.setItem('cached_tours', JSON.stringify(fetchedTours));
                });
                const unsubStations = onSnapshot(collection(db, 'stations'), snap => setAllStations(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order)));
                const unsubSettings = onSnapshot(doc(db, 'settings', 'global'), docSnap => {
                    if (docSnap.exists()) setAppSettings({ bgVideoUrl: '', bgImageUrl: '', impressumUrl: '', datenschutzUrl: '', quizInfo_choice: '', quizInfo_number: '', quizInfo_slider: '', quizInfo_order: '', pwaPromptIos: '', pwaPromptAndroid: '', finalText: '', donationUrl: '', donationText: '', ...docSnap.data() });
                });
                return () => { unsubTours(); unsubStations(); unsubSettings(); };
            }, []);
            
            const PwaPromptModal = () => {
                if (!showPwaPrompt) return null;
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                const promptText = isIOS
                    ? (appSettings.pwaPromptIos || "Tippe im Safari-Menü auf das Teilen-Symbol (Viereck mit Pfeil nach oben) und wähle 'Zum Home-Bildschirm', um das beste Erlebnis zu erhalten.")
                    : (appSettings.pwaPromptAndroid || "Tippe im Menü deines Browsers (drei Punkte) auf 'App installieren' oder 'Zum Startbildschirm hinzufügen', um das beste Erlebnis zu erhalten.");

                return (
                    <div className="fixed inset-0 bg-black/80 z-[300] flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-darkCard p-6 rounded-3xl shadow-2xl border border-gray-800 text-center max-w-sm w-full relative">
                            <div className="w-16 h-16 bg-iosBlue/20 text-iosBlue rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                            </div>
                            <h3 className="text-xl font-bold text-white mb-2">Als Web-App installieren</h3>
                            <p className="text-gray-300 text-sm leading-relaxed mb-6">{promptText}</p>
                            <button onClick={() => { localStorage.setItem('pwaPromptSeen', 'true'); setShowPwaPrompt(false); }} className="w-full bg-iosBlue text-white font-bold py-3 rounded-xl active:scale-95 transition-transform">
                                Verstanden
                            </button>
                        </div>
                    </div>
                );
            };

            const DesktopView = () => {
                const currentUrl = encodeURIComponent(window.location.href.split('?')[0]);
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${currentUrl}`;
                
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-center text-white">
                        <div className="bg-darkCard p-10 rounded-3xl max-w-md w-full shadow-2xl border border-gray-800 flex flex-col items-center">
                            <h1 className="text-3xl font-bold mb-2">Dorfrallye Thalau</h1>
                            <p className="text-gray-400 mb-8">Bitte öffne diese Seite auf deinem Smartphone, um die Touren zu erleben.</p>
                            <div className="bg-white p-4 rounded-2xl shadow-lg mb-8">
                                <img src={qrUrl} alt="QR Code" className="w-48 h-48" />
                            </div>
                            <p className="text-sm text-gray-500 mb-6">Mit der Handykamera scannen</p>
                            <hr className="w-full border-gray-700 mb-6" />
                            <button onClick={() => setView('login')} className="w-full bg-gray-800 hover:bg-gray-700 transition text-white font-bold py-3 rounded-xl border border-gray-700">
                                Zum Admin-Bereich
                            </button>
                        </div>
                    </div>
                );
            };

            const PlayerToursView = () => {
                const bgYtId = getYouTubeId(appSettings.bgVideoUrl);
                
                return (
                <div className="min-h-screen bg-black text-white relative overflow-hidden">
                    <div className="fixed top-0 left-0 w-full h-[35vh] bg-gray-900 z-30 shadow-[0_10px_30px_rgba(0,0,0,0.8)] pointer-events-none">
                        {bgYtId ? (
                            <iframe className="absolute inset-0 w-full h-full object-cover opacity-60 pointer-events-none" src={`https://www.youtube-nocookie.com/embed/${bgYtId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${bgYtId}&playsinline=1`} frameBorder="0" allow="autoplay; encrypted-media"></iframe>
                        ) : appSettings.bgVideoUrl ? (
                            <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover opacity-60">
                                <source src={appSettings.bgVideoUrl} type="video/mp4" />
                            </video>
                        ) : appSettings.bgImageUrl ? (
                            <img src={appSettings.bgImageUrl} className="absolute inset-0 w-full h-full object-cover opacity-60" alt="Hintergrund" />
                        ) : (
                            <div className="absolute inset-0 w-full h-full bg-gray-900 opacity-60"></div>
                        )}
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/30"></div>
                        <div className="absolute bottom-6 left-0 w-full px-6 flex justify-center">
                            <div className="bg-black/50 backdrop-blur-md border border-white/10 px-8 py-4 rounded-[2rem] shadow-xl text-center pointer-events-auto">
                                <h1 className="text-3xl md:text-4xl font-bold tracking-tight text-white text-shadow mb-1">Thalau Entdecken</h1>
                                <p className="text-gray-300 font-medium text-sm">Wähle deine Route</p>
                            </div>
                        </div>
                    </div>

                    <div className="fixed top-[35vh] bottom-[80px] left-0 w-full overflow-y-auto z-20 pb-10 pt-6 px-6 no-scrollbar">
                        <div className="space-y-6 max-w-md mx-auto w-full">
                            {tours.map(tour => {
                                const cardStyle = { backgroundImage: tour.imageUrl ? `url(${tour.imageUrl})` : 'none' };
                                return (
                                <div key={tour.id} onClick={() => { setActiveTourId(tour.id); setView('player_game'); }} 
                                     className="relative rounded-[28px] overflow-hidden cursor-pointer transform transition-all active:scale-[0.98] shadow-2xl border border-gray-800 bg-darkCard group">
                                    <div className="h-40 w-full bg-cover bg-center bg-gray-800" style={cardStyle}></div>
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>
                                    <div className="absolute bottom-0 left-0 w-full p-5">
                                        <h2 className="text-xl font-bold text-white mb-1">{tour.name}</h2>
                                        {tour.description && <p className="text-gray-400 text-xs mb-3 line-clamp-2 leading-relaxed">{tour.description}</p>}
                                        <div className="flex flex-wrap gap-2">
                                            {tour.duration && <span className="flex items-center gap-1 bg-white/10 backdrop-blur-md px-2.5 py-1 rounded-lg text-xs font-medium text-gray-200"><IconClock /> {tour.duration}</span>}
                                            {tour.length && <span className="flex items-center gap-1 bg-white/10 backdrop-blur-md px-2.5 py-1 rounded-lg text-xs font-medium text-gray-200"><IconRoute /> {tour.length}</span>}
                                            {tour.elevation && <span className="flex items-center gap-1 bg-white/10 backdrop-blur-md px-2.5 py-1 rounded-lg text-xs font-medium text-gray-200"><IconMountain /> {tour.elevation}</span>}
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    </div>

                    <footer className="fixed bottom-0 left-0 w-full h-[80px] bg-black border-t border-white/10 z-30 flex justify-center items-center px-4">
                        <div className="flex w-full max-w-md justify-between items-center text-xs">
                            <div className="flex-1 flex justify-center text-center">
                                {appSettings.impressumUrl && <a href={appSettings.impressumUrl} target="_blank" className="text-gray-500 hover:text-gray-300">Impressum</a>}
                            </div>
                            <div className="shrink-0 px-2">
                                <button onClick={() => setView('login')} className="font-medium hover:text-white transition bg-gray-900 px-4 py-1.5 rounded-full text-gray-400">Admin Login</button>
                            </div>
                            <div className="flex-1 flex justify-center text-center">
                                {appSettings.datenschutzUrl && <a href={appSettings.datenschutzUrl} target="_blank" className="text-gray-500 hover:text-gray-300">Datenschutz</a>}
                            </div>
                        </div>
                    </footer>
                </div>
                );
            };

            const MiniMap = ({ targetLat, targetLng, userLoc, tourPath, expanded }) => {
                const mapRef = React.useRef(null);
                const containerRef = React.useRef(null);
                const userMarkerRef = React.useRef(null);
                const targetMarkerRef = React.useRef(null);
                const guideLineRef = React.useRef(null);
                const pathLineRef = React.useRef(null);

                React.useEffect(() => {
                    if (!mapRef.current && userLoc && containerRef.current) {
                        mapRef.current = L.map(containerRef.current, { zoomControl: false, attributionControl: false }).setView([userLoc.lat, userLoc.lng], 16);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapRef.current);
                        
                        userMarkerRef.current = L.circleMarker([userLoc.lat, userLoc.lng], { color: '#0A84FF', radius: 8, fillOpacity: 1 }).addTo(mapRef.current);
                        if(targetLat) targetMarkerRef.current = L.marker([targetLat, targetLng]).addTo(mapRef.current);
                        
                        if (tourPath && tourPath.length > 0) {
                            pathLineRef.current = L.polyline(tourPath, { color: '#0A84FF', weight: 5, opacity: 0.8 }).addTo(mapRef.current);
                        }

                        if (targetLat) {
                            if (!tourPath || tourPath.length === 0) {
                                guideLineRef.current = L.polyline([[userLoc.lat, userLoc.lng], [targetLat, targetLng]], { color: '#666', weight: 3, dashArray: '5, 10' }).addTo(mapRef.current);
                            }
                            mapRef.current.fitBounds([[userLoc.lat, userLoc.lng], [targetLat, targetLng]], { padding: [20, 20], maxZoom: 18 });
                        }

                        const ro = new ResizeObserver(() => {
                            if (mapRef.current) mapRef.current.invalidateSize();
                        });
                        ro.observe(containerRef.current);
                        return () => ro.disconnect();
                    } else if (mapRef.current && userLoc) {
                        userMarkerRef.current.setLatLng([userLoc.lat, userLoc.lng]);
                        if(targetLat && targetMarkerRef.current) targetMarkerRef.current.setLatLng([targetLat, targetLng]);
                        if(targetLat && guideLineRef.current && (!tourPath || tourPath.length === 0)) guideLineRef.current.setLatLngs([[userLoc.lat, userLoc.lng], [targetLat, targetLng]]);
                        
                        if(tourPath && pathLineRef.current) {
                             pathLineRef.current.setLatLngs(tourPath);
                        }
                    }
                }, [targetLat, targetLng, userLoc, tourPath]);

                React.useEffect(() => {
                    if (mapRef.current) setTimeout(() => mapRef.current.invalidateSize(), 300);
                }, [expanded]);

                return <div ref={containerRef} className="w-full h-full rounded-2xl bg-gray-800 z-0"></div>;
            };

            const PlayerGameView = () => {
                const [userLoc, setUserLoc] = React.useState(null);
                const [currentStationIndex, setCurrentStationIndex] = React.useState(0);
                const [score, setScore] = React.useState(0);
                
                const [tourStarted, setTourStarted] = React.useState(false);
                const [showRules, setShowRules] = React.useState(false);

                const [sheetState, setSheetState] = React.useState('navigating'); 
                const [sheetMode, setSheetMode] = React.useState('quiz'); 
                const [sheetExpanded, setSheetExpanded] = React.useState(false);
                const [showQuizInfo, setShowQuizInfo] = React.useState(false);
                const [quizResult, setQuizResult] = React.useState(null);

                const [quizNumberInput, setQuizNumberInput] = React.useState('');
                const [quizSliderVal, setQuizSliderVal] = React.useState(50);
                const [quizOrderItems, setQuizOrderItems] = React.useState([]);
                const [selectedForSwap, setSelectedForSwap] = React.useState(null);

                const activeTour = tours.find(t => t.id === activeTourId);
                const tourStations = allStations.filter(s => s.tourId === activeTourId);
                const currentStation = tourStations[currentStationIndex];

                React.useEffect(() => {
                    if (!("geolocation" in navigator)) return;
                    const watchId = navigator.geolocation.watchPosition(
                        (pos) => setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => console.log("GPS Fehler"),
                        { enableHighAccuracy: true }
                    );
                    return () => navigator.geolocation.clearWatch(watchId);
                }, []);

                const getDistance = (lat1, lon1, lat2, lon2) => {
                    if(!lat1 || !lon1 || !lat2 || !lon2) return null;
                    const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                    const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                    const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                };

                const currentDistance = currentStation && userLoc ? getDistance(userLoc.lat, userLoc.lng, currentStation.lat, currentStation.lng) : null;
                const distanceToStart = activeTour?.parkingLat && userLoc ? getDistance(userLoc.lat, userLoc.lng, activeTour.parkingLat, activeTour.parkingLng) : null;
                const isNearStart = distanceToStart !== null && distanceToStart < 200;

                React.useEffect(() => {
                    if (sheetState === 'at_station' && currentStation?.hasQuiz) {
                        setQuizNumberInput('');
                        setQuizResult(null);
                        setShowQuizInfo(false);
                        setQuizSliderVal(currentStation.quiz?.sliderMin || 0);
                        if (currentStation.quizType === 'order' && currentStation.quiz?.orderItems) {
                            let items = currentStation.quiz.orderItems.map((text, index) => ({text, originalIndex: index}));
                            items.sort(() => Math.random() - 0.5);
                            setQuizOrderItems(items);
                        }
                        setSelectedForSwap(null);
                    }
                }, [sheetState, currentStation]);

                React.useEffect(() => {
                    if (tourStarted && sheetState === 'navigating' && currentDistance !== null && currentDistance <= 30) {
                        setSheetState('at_station');
                        setSheetMode(currentStation.hasQuiz ? 'quiz' : 'info');
                        setSheetExpanded(true);
                    }
                }, [currentDistance, sheetState, currentStation, tourStarted]);

                // Auto Finish wenn beim Parkplatz (Rückführung aktiv)
                React.useEffect(() => {
                    if (sheetState === 'returning' && distanceToStart !== null && distanceToStart < 30) {
                        showToast("Parkplatz erreicht! Tour erfolgreich beendet.");
                        setTimeout(() => setView('player_tours'), 3000);
                    }
                }, [distanceToStart, sheetState]);

                const evaluateQuiz = (isCorrect, isClose = false) => {
                    if (isCorrect) {
                        setQuizResult('correct');
                        setScore(s => s + 100);
                    } else if (isClose) {
                        setQuizResult('close');
                        setScore(s => s + 50);
                    } else {
                        setQuizResult('wrong');
                    }
                    setSheetMode('info');
                    setSheetExpanded(true);
                };

                const checkChoiceQuiz = (idx) => evaluateQuiz(idx === currentStation.quiz.correctIndex);
                const checkNumberQuiz = () => evaluateQuiz(parseInt(quizNumberInput) === parseInt(currentStation.quiz.correctNumber));
                const checkSliderQuiz = () => {
                    const diff = Math.abs(quizSliderVal - parseInt(currentStation.quiz.sliderCorrect));
                    const range = (currentStation.quiz.sliderMax || 100) - (currentStation.quiz.sliderMin || 0);
                    if (diff === 0) evaluateQuiz(true);
                    else if (diff <= range * 0.05) evaluateQuiz(false, true); 
                    else evaluateQuiz(false);
                };
                const checkOrderQuiz = () => {
                    const isCorrect = quizOrderItems.every((item, idx) => item.originalIndex === idx);
                    evaluateQuiz(isCorrect);
                };

                const handleNextStation = () => {
                    if (currentStationIndex + 1 < tourStations.length) {
                        setCurrentStationIndex(i => i + 1);
                        setSheetState('navigating');
                        setSheetExpanded(false);
                    } else {
                        setSheetState('finished');
                        setSheetExpanded(true);
                    }
                };

                const handleStationClick = (index) => {
                    if (index === currentStationIndex) {
                        setSheetState(prev => prev === 'hidden' ? 'navigating' : 'hidden');
                    }
                };

                // Sicherheitsabfrage beim Beenden (Pfeil Oben-Links)
                const handleBackClick = () => {
                    if (tourStarted && sheetState !== 'finished' && sheetState !== 'returning') {
                        if (window.confirm("Möchtest du die Tour wirklich abbrechen? Dein aktueller Fortschritt geht verloren.")) {
                            setView('player_tours');
                        }
                    } else {
                        setView('player_tours');
                    }
                };

                // PDF Urkunde Generierung
                const generatePDF = () => {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: 'landscape' });
                    
                    doc.setFillColor(28, 28, 30);
                    doc.rect(0, 0, 297, 210, 'F');
                    
                    doc.setDrawColor(10, 132, 255);
                    doc.setLineWidth(2);
                    doc.rect(10, 10, 277, 190);

                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(40);
                    doc.text("URKUNDE", 148.5, 50, { align: 'center' });
                    
                    doc.setFontSize(20);
                    doc.setTextColor(10, 132, 255);
                    doc.text("Dorfrallye Thalau", 148.5, 70, { align: 'center' });
                    
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(24);
                    doc.text(`Tour: ${activeTour?.name || ''}`, 148.5, 105, { align: 'center' });
                    
                    doc.setFontSize(20);
                    doc.text(`Erreichte Punkte: ${score}`, 148.5, 130, { align: 'center' });
                    
                    doc.setFontSize(14);
                    doc.setTextColor(150, 150, 150);
                    doc.text(`Datum: ${new Date().toLocaleDateString('de-DE')}`, 148.5, 170, { align: 'center' });
                    
                    doc.save(`Urkunde_${activeTour?.name || 'Tour'}.pdf`);
                };

                const getSpacerHeight = () => {
                    if (sheetState === 'hidden') return '20px';
                    return sheetExpanded ? '75vh' : '40vh'; 
                };
                
                const currentPathChunk = currentStation?.path || [];
                const mediaYt = sheetMode === 'info' && currentStation ? getYouTubeId(currentStation.mediaUrl) : null;
                const isMp4 = sheetMode === 'info' && currentStation && currentStation.mediaUrl && currentStation.mediaUrl.toLowerCase().endsWith('.mp4');

                const mainStyle = { paddingTop: '27vh' };
                const spacerStyle = { height: getSpacerHeight() };

                return (
                    <div className="min-h-screen bg-black">
                        <header className="fixed top-0 left-0 w-full h-[25vh] z-50 overflow-hidden bg-gray-900 shadow-lg">
                            {activeTour?.imageUrl && (
                                <img src={activeTour.imageUrl} className="absolute inset-0 w-full h-full object-cover" alt="Hintergrund" />
                            )}
                            <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-black/50 to-[#000000]"></div>
                            
                            {/* Zurück Button auf top-14 (Abstand für Uhrzeit) */}
                            <button onClick={handleBackClick} className="absolute top-14 left-4 w-10 h-10 flex items-center justify-center bg-black/30 backdrop-blur-md rounded-full text-white shadow-lg z-50 active:scale-90 transition-transform">
                                <IconChevronLeft />
                            </button>

                            <div className="absolute inset-0 flex flex-col items-center justify-center px-16 pt-12">
                                <h1 className="text-3xl font-bold text-white text-center leading-tight text-shadow break-words hyphens-auto w-full line-clamp-2" lang="de">
                                    {activeTour?.name || "Historische Tour"}
                                </h1>
                                <div className={`mt-3 px-4 py-1.5 rounded-full border text-xs font-bold uppercase tracking-widest backdrop-blur-sm ${userLoc ? 'border-green-500 bg-green-900/40 text-green-400' : 'border-orange-500 bg-orange-900/40 text-orange-400'}`}>
                                    {userLoc ? "GPS AKTIV" : "SUCHE GPS..."}
                                </div>
                            </div>
                        </header>

                        {tourStarted && <div className="fade-mask"></div>}

                        <main className="relative z-10 px-4" style={mainStyle}>
                            {!tourStarted ? (
                                /* Anreise: Höhe begrenzt & Scroll deaktiviert */
                                <div className="max-w-md mx-auto pt-6 text-center relative z-50 h-[70vh] overflow-hidden">
                                    <div className="bg-darkCard p-6 rounded-3xl shadow-2xl border border-white/10 text-left mb-6 relative">
                                        <h2 className="text-2xl font-bold text-white mb-4">Tour Übersicht</h2>
                                        <div className="space-y-3 mb-6">
                                            <div className="flex justify-between border-b border-gray-800 pb-2"><span className="text-gray-400">Länge</span><span className="font-medium text-white">{activeTour?.length || '-'}</span></div>
                                            <div className="flex justify-between border-b border-gray-800 pb-2"><span className="text-gray-400">Dauer</span><span className="font-medium text-white">{activeTour?.duration || '-'}</span></div>
                                            <div className="flex justify-between border-b border-gray-800 pb-2"><span className="text-gray-400">Stationen</span><span className="font-medium text-white">{tourStations.length}</span></div>
                                            
                                            <div className="flex justify-between items-start pt-1">
                                                <span className="text-gray-400 w-1/3">Einkehr</span>
                                                <span className="font-medium text-white w-2/3 text-right leading-tight">{activeTour?.refreshments || '-'}</span>
                                            </div>
                                        </div>
                                        
                                        {activeTour?.parkingLat ? (
                                            <div>
                                                {isNearStart ? (
                                                    <button onClick={() => setShowRules(true)} className="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg">
                                                        Tour Starten
                                                    </button>
                                                ) : (
                                                    <div>
                                                        <a href={`https://www.google.com/maps/dir/?api=1&destination=${activeTour.parkingLat},${activeTour.parkingLng}`} target="_blank" className="w-full bg-iosBlue flex justify-center text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg mb-2">
                                                            Navigation zum Start
                                                        </a>
                                                        <button onClick={() => setShowRules(true)} className="w-full text-gray-500 text-xs underline mt-2">
                                                            Jetzt starten
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <button onClick={() => setShowRules(true)} className="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg">
                                                Tour Starten
                                            </button>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="relative max-w-md mx-auto pt-4">
                                    <div className="timeline-line"></div>

                                    {tourStations.map((station, index) => {
                                        const isPast = index < currentStationIndex;
                                        const isCurrent = index === currentStationIndex;
                                        const isFuture = index > currentStationIndex;
                                        const isLeft = index % 2 === 0;

                                        return (
                                            <div key={station.id} className={`timeline-item ${isLeft ? 'left' : 'right'}`}>
                                                <div className="absolute left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-black border-2 border-gray-800 flex items-center justify-center z-10 shadow-lg">
                                                    {isPast ? <div className="bg-green-500 w-full h-full rounded-full flex items-center justify-center"><IconCheck /></div> : <IconLock />}
                                                </div>

                                                <div className="timeline-card-wrapper" onClick={() => handleStationClick(index)}>
                                                    <div className={`p-4 flex flex-col items-center text-center shadow-2xl rounded-2xl border transition-colors ${isCurrent ? 'bg-darkCard border-iosBlue/50' : 'bg-[#121212] border-white/5'}`}>
                                                        <h2 className="text-white font-bold mb-1 text-base break-words hyphens-auto w-full" lang="de">
                                                            {isFuture ? `Station ${index + 1}` : station.name}
                                                        </h2>
                                                        <p className="text-gray-500 text-[12px] leading-snug mt-1">
                                                            {isPast ? "Erfolgreich abgeschlossen." : isCurrent ? "Gehe zum Ort, um das Rätsel zu öffnen." : "Noch gesperrt."}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div className="w-full transition-all duration-300" style={spacerStyle}></div>
                                </div>
                            )}
                        </main>

                        {/* Regeln Pop-Up Scroll-Fix (NUR der Fließtext scrollt) */}
                        {showRules && !tourStarted && (
                             <div className="fixed bottom-0 left-0 w-full z-[150] bg-[#1C1C1E] border-t border-gray-800 rounded-t-[32px] shadow-[0_-20px_50px_rgba(0,0,0,0.8)] sheet-transition h-[75vh] flex flex-col">
                                <div className="px-6 pt-8 pb-4 flex-shrink-0">
                                    <h3 className="text-2xl font-bold text-white">Regeln & Infos</h3>
                                </div>
                                <div className="px-6 flex-1 overflow-y-auto">
                                    <div className="bg-gray-800/50 p-4 rounded-xl text-gray-300 leading-relaxed whitespace-pre-wrap">
                                        {activeTour?.rulesText || "Viel Spaß bei der Tour! Bitte achtet auf den Verkehr und nehmt Rücksicht auf die Natur."}
                                    </div>
                                </div>
                                <div className="px-6 pt-4 pb-8 flex-shrink-0">
                                    <button onClick={() => { setShowRules(false); setTourStarted(true); setSheetState('navigating'); }} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg">
                                        Fertig
                                    </button>
                                </div>
                             </div>
                        )}

                        {tourStarted && sheetState !== 'hidden' && (
                            <div className={`fixed bottom-0 left-0 w-full z-[100] bg-[#1C1C1E] border-t border-gray-800 rounded-t-[32px] shadow-[0_-20px_50px_rgba(0,0,0,0.8)] sheet-transition flex flex-col ${sheetExpanded ? 'h-[75vh]' : 'h-auto pb-8'}`}>
                                
                                {sheetState === 'navigating' ? (
                                    <div className="w-full pt-3 pb-3 flex justify-center cursor-pointer flex-shrink-0" onClick={() => setSheetExpanded(!sheetExpanded)}>
                                        <div className="w-14 h-1.5 bg-gray-600 rounded-full"></div>
                                    </div>
                                ) : (
                                    <div className="w-full pt-6"></div>
                                )}

                                <div className="px-6 flex-1 overflow-y-auto">
                                    {sheetState === 'navigating' && currentStation && (
                                        <div className="h-full flex flex-col pb-6">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex-1 pr-4">
                                                    <p className="text-gray-400 text-xs font-medium uppercase tracking-wider mb-1">Nächstes Ziel</p>
                                                    <h3 className="text-xl font-bold text-white leading-tight">{currentStation.name}</h3>
                                                </div>
                                                {currentDistance !== null && (
                                                    <div className="bg-iosBlue text-white font-bold text-sm px-3 py-1.5 rounded-xl shadow-lg whitespace-nowrap">
                                                        {Math.round(currentDistance)} m
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className={`w-full bg-gray-800 rounded-2xl transition-all duration-300 relative ${sheetExpanded ? 'flex-1 min-h-[300px]' : 'h-40'}`}>
                                                <MiniMap targetLat={currentStation.lat} targetLng={currentStation.lng} userLoc={userLoc} tourPath={currentPathChunk} expanded={sheetExpanded} />
                                                {!sheetExpanded && <div className="absolute inset-0 bg-black/10 flex items-center justify-center pointer-events-none rounded-2xl"><span className="bg-black/60 text-white text-xs px-3 py-1 rounded-full backdrop-blur-md">Tippen für große Karte</span></div>}
                                            </div>
                                        </div>
                                    )}

                                    {sheetState === 'at_station' && (
                                        <div className="pt-2 pb-8">
                                            
                                            {sheetMode === 'quiz' && currentStation.hasQuiz && (
                                                <div className="space-y-4">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <h3 className="text-2xl font-bold text-white flex-1 pr-2 break-words hyphens-auto" lang="de">Ziel erreicht! Zeit für ein Rätsel.</h3>
                                                        
                                                        {(() => {
                                                            const defaultQuizInfos = {
                                                                choice: "Wähle die richtige Antwort aus den Optionen.",
                                                                number: "Gib die exakte Zahl ein.",
                                                                slider: "Schiebe den Regler auf den gesuchten Wert.",
                                                                order: "Tippe nacheinander auf zwei Elemente, um ihre Positionen zu tauschen. (Am PC: Drag & Drop)"
                                                            };
                                                            const quizInfoText = appSettings[`quizInfo_${currentStation.quizType}`] || defaultQuizInfos[currentStation.quizType];
                                                            
                                                            return quizInfoText ? (
                                                                <button onClick={() => setShowQuizInfo(!showQuizInfo)} className={`p-2 rounded-full transition-colors flex-shrink-0 ${showQuizInfo ? 'bg-iosBlue text-white' : 'bg-gray-800 text-gray-400'}`}>
                                                                    <IconInfo />
                                                                </button>
                                                            ) : null;
                                                        })()}
                                                    </div>

                                                    {showQuizInfo && (
                                                        <div className="bg-blue-900/30 border border-blue-500/50 p-3 rounded-xl text-sm text-blue-200 mb-4">
                                                            {appSettings[`quizInfo_${currentStation.quizType}`] || {
                                                                choice: "Wähle die richtige Antwort aus den Optionen.",
                                                                number: "Gib die exakte Zahl ein.",
                                                                slider: "Schiebe den Regler auf den gesuchten Wert.",
                                                                order: "Tippe nacheinander auf zwei Elemente, um ihre Positionen zu tauschen. (Am PC: Drag & Drop)"
                                                            }[currentStation.quizType]}
                                                        </div>
                                                    )}

                                                    <p className="text-gray-300 font-medium mb-4">{currentStation.quiz?.question}</p>
                                                    
                                                    {currentStation.quizType === 'choice' && (
                                                        <div className="space-y-2">
                                                            {currentStation.quiz?.answers.map((ans, idx) => (
                                                                <button key={idx} onClick={() => checkChoiceQuiz(idx)} className="w-full bg-gray-800 hover:bg-gray-700 text-white p-4 rounded-xl text-left border border-gray-700 transition">
                                                                    {ans}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    )}

                                                    {currentStation.quizType === 'number' && (
                                                        <div className="space-y-4">
                                                            <input type="number" value={quizNumberInput} onChange={e=>setQuizNumberInput(e.target.value)} placeholder="Zahl eingeben..." className="w-full p-4 rounded-xl text-black font-bold text-lg text-center" />
                                                            <button onClick={checkNumberQuiz} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl">Einloggen</button>
                                                        </div>
                                                    )}

                                                    {currentStation.quizType === 'slider' && (
                                                        <div className="space-y-6 pt-4">
                                                            <div className="text-center font-bold text-3xl text-iosBlue">{quizSliderVal}</div>
                                                            <input type="range" min={currentStation.quiz.sliderMin || 0} max={currentStation.quiz.sliderMax || 100} value={quizSliderVal} onChange={e=>setQuizSliderVal(parseInt(e.target.value))} />
                                                            <div className="flex justify-between text-gray-500 text-sm">
                                                                <span>{currentStation.quiz.sliderMin || 0}</span>
                                                                <span>{currentStation.quiz.sliderMax || 100}</span>
                                                            </div>
                                                            <button onClick={checkSliderQuiz} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl">Einloggen</button>
                                                        </div>
                                                    )}

                                                    {currentStation.quizType === 'order' && (
                                                        <div className="space-y-2">
                                                            <p className="text-gray-400 text-xs mb-2">Tippe auf zwei Elemente nacheinander, um sie zu tauschen, oder nutze Drag & Drop (am PC).</p>
                                                            {quizOrderItems.map((item, index) => (
                                                                <div key={item.text} 
                                                                    draggable
                                                                    onDragStart={(e) => e.dataTransfer.setData('text/plain', index)}
                                                                    onDragOver={(e) => e.preventDefault()}
                                                                    onDrop={(e) => {
                                                                        e.preventDefault();
                                                                        const dragIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
                                                                        if(dragIdx === index) return;
                                                                        const newItems = [...quizOrderItems];
                                                                        const temp = newItems[dragIdx];
                                                                        newItems[dragIdx] = newItems[index];
                                                                        newItems[index] = temp;
                                                                        setQuizOrderItems(newItems);
                                                                    }}
                                                                    onClick={() => {
                                                                        if (selectedForSwap === null) {
                                                                            setSelectedForSwap(index);
                                                                        } else if (selectedForSwap === index) {
                                                                            setSelectedForSwap(null);
                                                                        } else {
                                                                            const newItems = [...quizOrderItems];
                                                                            const temp = newItems[selectedForSwap];
                                                                            newItems[selectedForSwap] = newItems[index];
                                                                            newItems[index] = temp;
                                                                            setQuizOrderItems(newItems);
                                                                            setSelectedForSwap(null);
                                                                        }
                                                                    }}
                                                                    className={`flex items-center gap-3 bg-gray-800 p-3 rounded-xl border transition cursor-pointer ${selectedForSwap === index ? 'border-iosBlue bg-blue-900/30 shadow-[0_0_15px_rgba(10,132,255,0.3)] scale-[1.02]' : 'border-gray-700'}`}>
                                                                    
                                                                    <div className="w-6 h-6 flex items-center justify-center bg-black/50 text-gray-500 rounded-md font-bold text-xs pointer-events-none">{index + 1}</div>
                                                                    <div className="font-medium flex-1 pointer-events-none">{item.text}</div>
                                                                    <div className="text-gray-500 pointer-events-none tracking-widest leading-none">•••</div>
                                                                </div>
                                                            ))}
                                                            <button onClick={checkOrderQuiz} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl mt-4">Prüfen</button>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {sheetMode === 'info' && (
                                                <div className="space-y-4">
                                                    {quizResult === 'correct' && <div className="bg-green-900/30 border border-green-500 text-green-400 font-bold p-3 rounded-xl text-center mb-4">Richtig! Super gemacht!</div>}
                                                    {quizResult === 'close' && <div className="bg-yellow-900/30 border border-yellow-500 text-yellow-400 font-bold p-3 rounded-xl text-center mb-4">Fast! Sehr gut geschätzt!</div>}
                                                    {quizResult === 'wrong' && <div className="bg-red-900/30 border border-red-500 text-red-400 font-bold p-3 rounded-xl text-center mb-4">Leider nicht ganz richtig!</div>}
                                                    
                                                    {!currentStation.hasQuiz && <h3 className="text-2xl font-bold text-white mb-4">Station erreicht!</h3>}

                                                    {mediaYt ? (
                                                        <iframe className="w-full h-48 object-cover rounded-xl border border-gray-700" src={`https://www.youtube-nocookie.com/embed/${mediaYt}`} frameBorder="0" allowFullScreen></iframe>
                                                    ) : isMp4 ? (
                                                        <video className="w-full h-48 object-cover rounded-xl border border-gray-700" src={currentStation.mediaUrl} controls playsInline></video>
                                                    ) : currentStation.mediaUrl ? (
                                                        <img src={currentStation.mediaUrl} alt="Info" className="w-full h-48 object-cover rounded-xl border border-gray-700" />
                                                    ) : null}
                                                    
                                                    <div className="bg-gray-800/50 p-4 rounded-xl border border-gray-800">
                                                        <h4 className="font-bold text-sm text-iosBlue mb-2">Information</h4>
                                                        <p className="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">{currentStation.infoText || currentStation.riddle || "Keine weiteren Infos hinterlegt."}</p>
                                                    </div>
                                                    <button onClick={handleNextStation} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl active:bg-blue-600 transition">Weiter zur nächsten Station</button>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* Abschluss-Urkunden Seite */}
                                    {sheetState === 'finished' && (
                                        <div className="pt-8 pb-8 flex flex-col items-center">
                                            <h3 className="text-3xl font-bold text-green-500 mb-2 text-center">Herzlichen Glückwunsch!</h3>
                                            <p className="text-gray-300 mb-6 text-center">Du hast die Tour erfolgreich abgeschlossen.</p>
                                            
                                            <div className="bg-gray-800 p-6 rounded-3xl w-full mb-6 text-center">
                                                <div className="text-sm text-gray-400 uppercase tracking-widest mb-1">Erreichte Punkte</div>
                                                <div className="text-5xl font-bold text-iosBlue">{score}</div>
                                            </div>

                                            {appSettings.finalText && <p className="text-gray-300 mb-8 leading-relaxed whitespace-pre-wrap text-center">{appSettings.finalText}</p>}
                                            
                                            <button onClick={generatePDF} className="w-full bg-darkCard border border-gray-700 text-white font-bold py-4 rounded-xl mb-4 flex items-center justify-center gap-2 transition active:scale-95">
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                                Urkunde als PDF
                                            </button>

                                            {appSettings.donationUrl && (
                                                <a href={appSettings.donationUrl} target="_blank" rel="noopener noreferrer" className="w-full bg-pink-600 text-white font-bold py-4 rounded-xl mb-6 text-center transition active:scale-95">
                                                    {appSettings.donationText || 'Kleine Spende hinterlassen ☕'}
                                                </a>
                                            )}

                                            {activeTour?.returnToParking && activeTour?.parkingLat ? (
                                                <button onClick={() => {setSheetState('returning'); setSheetExpanded(true);}} className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl transition active:scale-95">Zurück zum Parkplatz</button>
                                            ) : (
                                                <button onClick={()=>setView('player_tours')} className="w-full bg-gray-800 text-white font-bold py-4 rounded-xl transition active:scale-95">Zurück zur Übersicht</button>
                                            )}
                                        </div>
                                    )}

                                    {/* Rückführung zum Auto */}
                                    {sheetState === 'returning' && (
                                        <div className="pt-2 pb-8 flex flex-col h-full">
                                            <h3 className="text-2xl font-bold text-white mb-4">Rückweg zum Parkplatz</h3>
                                            <p className="text-gray-400 mb-4 text-sm">Folge der Karte zurück zu deinem Ausgangspunkt.</p>
                                            
                                            <div className={`w-full bg-gray-800 rounded-2xl transition-all duration-300 relative flex-1 min-h-[300px] mb-4`}>
                                                <MiniMap targetLat={activeTour?.parkingLat} targetLng={activeTour?.parkingLng} userLoc={userLoc} tourPath={activeTour?.returnPath || []} expanded={true} />
                                            </div>
                                            
                                            {distanceToStart !== null && distanceToStart < 30 ? (
                                                <button onClick={()=>setView('player_tours')} className="w-full bg-green-600 text-white font-bold py-4 rounded-xl">Abschließen</button>
                                            ) : (
                                                <div className="bg-gray-800 text-center font-bold text-white p-4 rounded-xl">Noch {distanceToStart ? Math.round(distanceToStart) : '-'} m</div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const LoginView = () => {
                const [email, setEmail] = React.useState('');
                const [password, setPassword] = React.useState('');
                const handleLogin = async (e) => {
                    e.preventDefault();
                    try { await signInWithEmailAndPassword(auth, email, password); setView('admin_tours'); }
                    catch (err) { alert("Login fehlgeschlagen."); }
                };
                return (
                    <div className="min-h-screen bg-gray-900 flex items-center justify-center p-6">
                        <form onSubmit={handleLogin} className="bg-darkCard p-8 rounded-3xl max-w-sm w-full space-y-4 shadow-2xl border border-gray-800">
                            <h2 className="text-2xl font-bold text-white mb-6">Admin Login</h2>
                            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3 rounded-xl text-black" placeholder="E-Mail" />
                            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 rounded-xl text-black" placeholder="Passwort" />
                            <button type="submit" className="w-full bg-iosBlue text-white font-bold py-3 rounded-xl">Einloggen</button>
                            <button type="button" onClick={() => setView('player_tours')} className="w-full text-gray-500 text-sm mt-4">Zurück</button>
                        </form>
                    </div>
                );
            };

            const AdminToursView = () => {
                const [showForm, setShowForm] = React.useState(false);
                const [editingId, setEditingId] = React.useState(null);
                const [formData, setFormData] = React.useState({ name: '', description: '', duration: '', length: '', elevation: '', refreshments: '', imageUrl: '', parkingLat: '', parkingLng: '', rulesText: '', returnToParking: false });
                const parkingMapRef = React.useRef(null);
                const parkingMarkerRef = React.useRef(null);
                const parkingContainerRef = React.useRef(null);

                const editTour = (tour) => {
                    setEditingId(tour.id);
                    setFormData({ name: tour.name||'', description: tour.description||'', duration: tour.duration||'', length: tour.length||'', elevation: tour.elevation||'', refreshments: tour.refreshments||'', imageUrl: tour.imageUrl||'', parkingLat: tour.parkingLat||'', parkingLng: tour.parkingLng||'', rulesText: tour.rulesText||'', returnToParking: tour.returnToParking||false });
                    setShowForm(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const resetForm = () => {
                    setEditingId(null);
                    setFormData({ name: '', description: '', duration: '', length: '', elevation: '', refreshments: '', imageUrl: '', parkingLat: '', parkingLng: '', rulesText: '', returnToParking: false });
                    setShowForm(false);
                }

                React.useEffect(() => {
                    if (showForm && !parkingMapRef.current && parkingContainerRef.current) {
                        const initLat = formData.parkingLat || 50.418;
                        const initLng = formData.parkingLng || 9.757;
                        
                        const map = L.map(parkingContainerRef.current).setView([initLat, initLng], 15);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        
                        if(formData.parkingLat) {
                            parkingMarkerRef.current = L.marker([formData.parkingLat, formData.parkingLng]).addTo(map);
                        }

                        map.on('click', function(e) {
                            setFormData(prev => ({...prev, parkingLat: e.latlng.lat.toFixed(6), parkingLng: e.latlng.lng.toFixed(6)}));
                            if(parkingMarkerRef.current) map.removeLayer(parkingMarkerRef.current);
                            parkingMarkerRef.current = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
                        });
                        parkingMapRef.current = map;

                        const ro = new ResizeObserver(() => map.invalidateSize());
                        ro.observe(parkingContainerRef.current);
                        return () => ro.disconnect();

                    } else if (!showForm && parkingMapRef.current) {
                        parkingMapRef.current.remove();
                        parkingMapRef.current = null;
                    }
                }, [showForm]);

                const saveTour = async (e) => {
                    e.preventDefault();
                    try {
                        if (editingId) {
                            await updateDoc(doc(db, 'tours', editingId), formData);
                            showToast("Tour aktualisiert!");
                        } else {
                            await addDoc(collection(db, 'tours'), { ...formData, createdAt: Date.now() });
                            showToast("Tour erstellt!");
                        }
                        resetForm();
                    } catch (e) {
                        showToast("Fehler! Firebase Regeln checken.");
                    }
                };

                const safePaddingStyle = { paddingTop: 'calc(env(safe-area-inset-top) + 2rem)' };

                return (
                    <div className="min-h-screen bg-gray-900 px-8 pb-24 text-white" style={safePaddingStyle}>
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-3xl font-bold">Touren</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setView('admin_settings')} className="bg-gray-800 p-2 rounded-xl"><IconSettings /></button>
                                <button onClick={() => {signOut(auth); setView('player_tours');}} className="bg-red-900/50 text-red-400 p-2 rounded-xl">Logout</button>
                            </div>
                        </div>

                        {!showForm ? (
                            <button onClick={() => setShowForm(true)} className="w-full bg-iosBlue text-white font-bold py-4 rounded-2xl mb-8 shadow-lg">+ Neue Tour anlegen</button>
                        ) : (
                            <form onSubmit={saveTour} className="bg-darkCard p-6 rounded-3xl mb-8 space-y-4">
                                <h3 className="text-xl font-bold">{editingId ? 'Tour bearbeiten' : 'Neue Tour'}</h3>
                                <input type="text" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} placeholder="Tour Name" className="w-full p-3 rounded-xl text-black" required />
                                <textarea value={formData.description} onChange={e=>setFormData({...formData, description: e.target.value})} placeholder="Beschreibung" className="w-full p-3 rounded-xl text-black" />
                                <div className="flex gap-2">
                                    <input type="text" value={formData.length} onChange={e=>setFormData({...formData, length: e.target.value})} placeholder="Länge (5km)" className="w-1/3 p-3 rounded-xl text-black" />
                                    <input type="text" value={formData.duration} onChange={e=>setFormData({...formData, duration: e.target.value})} placeholder="Dauer (2h)" className="w-1/3 p-3 rounded-xl text-black" />
                                    <input type="text" value={formData.elevation} onChange={e=>setFormData({...formData, elevation: e.target.value})} placeholder="Höhenmeter" className="w-1/3 p-3 rounded-xl text-black" />
                                </div>
                                <input type="text" value={formData.refreshments} onChange={e=>setFormData({...formData, refreshments: e.target.value})} placeholder="Einkehr" className="w-full p-3 rounded-xl text-black" />
                                <input type="url" value={formData.imageUrl} onChange={e=>setFormData({...formData, imageUrl: e.target.value})} placeholder="Bild URL" className="w-full p-3 rounded-xl text-black" />
                                
                                <hr className="border-gray-700 my-4"/>
                                <h4 className="font-bold text-gray-300">Anreise & Start</h4>
                                
                                <div className="space-y-2">
                                    <p className="text-xs text-gray-400">Klicke auf die Karte, um den Parkplatz/Startpunkt zu markieren:</p>
                                    <div ref={parkingContainerRef} className="h-48 w-full rounded-xl bg-gray-200"></div>
                                </div>

                                <div className="flex gap-2">
                                    <input type="text" value={formData.parkingLat} readOnly placeholder="Lat" className="w-1/2 p-3 rounded-xl bg-gray-800 text-gray-400" />
                                    <input type="text" value={formData.parkingLng} readOnly placeholder="Lng" className="w-1/2 p-3 rounded-xl bg-gray-800 text-gray-400" />
                                </div>
                                <textarea value={formData.rulesText} onChange={e=>setFormData({...formData, rulesText: e.target.value})} placeholder="Regeln & Infos für Pop-Up vor dem Start" className="w-full p-3 rounded-xl text-black h-24" />

                                <label className="flex items-center space-x-2 text-white font-bold mt-2">
                                    <input type="checkbox" checked={formData.returnToParking} onChange={e=>setFormData({...formData, returnToParking: e.target.checked})} className="w-5 h-5 rounded" />
                                    <span>Rückführung zum Parkplatz (am Ende der Tour)</span>
                                </label>

                                <div className="flex gap-2 pt-2">
                                    <button type="button" onClick={resetForm} className="bg-gray-700 px-4 rounded-xl">Abbrechen</button>
                                    <button type="submit" className="flex-1 bg-iosBlue text-white font-bold py-3 rounded-xl">{editingId ? 'Speichern' : 'Anlegen'}</button>
                                </div>
                            </form>
                        )}

                        <div className="space-y-4">
                            {tours.map(t => (
                                <div key={t.id} className="bg-darkCard p-5 rounded-2xl flex justify-between items-center border border-gray-800">
                                    <div>
                                        <h3 className="font-bold text-lg">{t.name}</h3>
                                        <button onClick={()=> {setActiveTourId(t.id); setView('admin_stations');}} className="text-iosBlue text-sm mt-1">Stationen & Route →</button>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => editTour(t)} className="p-2 bg-gray-800 rounded-lg"><IconEdit /></button>
                                        <button onClick={() => {if(window.confirm('Löschen?')) deleteDoc(doc(db, 'tours', t.id));}} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><IconTrash /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const AdminStationsView = () => {
                const activeTour = tours.find(t => t.id === activeTourId);
                const tourStations = allStations.filter(s => s.tourId === activeTourId);
                const [mode, setMode] = React.useState('station'); 
                const [tourPath, setTourPath] = React.useState([]);
                const [showForm, setShowForm] = React.useState(false);
                const [segmentId, setSegmentId] = React.useState('');
                
                const [editingId, setEditingId] = React.useState(null);
                
                const defaultQuiz = { 
                    question: '', 
                    answers: ['', '', '', ''], correctIndex: 0, 
                    correctNumber: 0, 
                    sliderMin: 0, sliderMax: 100, sliderCorrect: 50,
                    orderItems: ['', '', '', '']
                };
                const [stData, setStData] = React.useState({ name: '', lat: '', lng: '', infoText: '', mediaUrl: '', hasQuiz: false, quizType: 'choice', quiz: defaultQuiz });
                
                const mapRef = React.useRef(null);
                const polylineRef = React.useRef(null);
                const markerRef = React.useRef(null);
                const containerRef = React.useRef(null);

                const showMap = mode === 'route' || showForm;

                React.useEffect(() => {
                    if (mode === 'route' && !segmentId && tourStations.length > 0) {
                        setSegmentId(tourStations[0].id);
                    }
