<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dorf-Rallye</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { iosBlue: '#007AFF', iosBg: '#F2F2F7' } } }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #F2F2F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // WICHTIG: Echte Auth-Methoden importiert
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // HIER DEINE ECHTEN FIREBASE DATEN EINTRAGEN
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBpsE5x-nKFHk8fn_v85_1qseZaOXzGil0",
            authDomain: "dorf-rallye.firebaseapp.com",
            projectId: "dorf-rallye",
            storageBucket: "dorf-rallye.firebasestorage.app",
            messagingSenderId: "816087472841",
            appId: "1:816087472841:web:daacaf4554b37ce9a6cb18",
            measurementId: "G-M6E4P73X60"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Icons
        const IconMapPin = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconLock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconUnlock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const IconTrash = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

        function App() {
            const [adminUser, setAdminUser] = React.useState(null);
            const [view, setView] = React.useState('loading'); 
            const [stations, setStations] = React.useState([]);
            const [toast, setToast] = React.useState(null);

            // 1. Auth Listener für den Admin
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setAdminUser(currentUser);
                    checkDevice(); // View aktualisieren basierend auf Gerät & Login
                });

                const checkDevice = () => {
                    if (window.innerWidth > 768) {
                        setView('desktop');
                    } else {
                        setView('player');
                    }
                };

                window.addEventListener('resize', checkDevice);
                return () => {
                    unsubscribe();
                    window.removeEventListener('resize', checkDevice);
                };
            }, []);

            // 2. Daten laden (Darf jeder, dank unserer Firestore Rules)
            React.useEffect(() => {
                const stationsRef = collection(db, 'stations');
                const unsubscribe = onSnapshot(stationsRef, (snapshot) => {
                    const loadedStations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStations(loadedStations);
                }, (error) => {
                    console.error("Firebase Read Error. Hast du die Config eingetragen?", error);
                });

                return () => unsubscribe();
            }, []);

            const showToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 3000);
            };

            // --- DESKTOP ANSICHT ---
            const DesktopView = () => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;
                
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-white">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-md text-center">
                            <h1 className="text-3xl font-bold text-gray-900 mb-4">Dorf-Rallye Portal</h1>
                            <p className="text-gray-600 mb-8">Scanne den QR-Code mit dem Handy, um die Tour zu starten.</p>
                            <div className="flex justify-center mb-8">
                                <img src={qrUrl} alt="QR Code" className="rounded-lg shadow-md" />
                            </div>
                            <button 
                                onClick={() => setView('login')}
                                className="w-full bg-iosBlue text-white font-semibold py-3 px-4 rounded-xl hover:bg-blue-600">
                                Admin Login
                            </button>
                        </div>
                    </div>
                );
            };

            // --- ECHTER LOGIN BEREICH ---
            const LoginView = () => {
                const [email, setEmail] = React.useState('');
                const [password, setPassword] = React.useState('');
                const [error, setError] = React.useState('');

                // Überspringen, falls schon eingeloggt
                if (adminUser) {
                    setView('admin');
                    return null;
                }

                const handleLogin = async (e) => {
                    e.preventDefault();
                    try {
                        await signInWithEmailAndPassword(auth, email, password);
                        showToast("Erfolgreich eingeloggt!");
                        setView('admin');
                    } catch (err) {
                        console.error("Firebase Login Error:", err);
                        // Bessere Fehlerbehandlung: Zeigt den echten Grund an!
                        if (err.code === 'auth/unauthorized-domain') {
                            setError("Sicherheitsblockade: Diese Website-URL muss erst in Firebase (Auth -> Settings -> Authorized domains) eingetragen werden!");
                        } else if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                            setError("Login fehlgeschlagen. E-Mail oder Passwort falsch.");
                        } else {
                            setError("Fehler: " + err.message);
                        }
                    }
                };

                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6">
                        <div className="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
                            <h2 className="text-2xl font-bold mb-6 text-center text-gray-800">Admin Login</h2>
                            {error && <p className="bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-sm">{error}</p>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">E-Mail</label>
                                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full border p-3 rounded-xl" required />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full border p-3 rounded-xl" required />
                                </div>
                                <button type="submit" className="w-full bg-iosBlue text-white font-bold py-3 rounded-xl">Einloggen</button>
                            </form>
                            <button onClick={() => setView(window.innerWidth > 768 ? 'desktop' : 'player')} className="mt-4 w-full text-gray-500 text-sm">Zurück</button>
                        </div>
                    </div>
                );
            };

            // --- ADMIN DASHBOARD ---
            const AdminView = () => {
                const [name, setName] = React.useState('');
                const [lat, setLat] = React.useState('');
                const [lng, setLng] = React.useState('');
                const [riddle, setRiddle] = React.useState('');

                // Sicherheit: Wenn nicht eingeloggt, zurück zum Login
                if (!adminUser) {
                    setView('login');
                    return null;
                }

                const handleLogout = async () => {
                    await signOut(auth);
                    setView(window.innerWidth > 768 ? 'desktop' : 'player');
                };

                const handleAdd = async (e) => {
                    e.preventDefault();
                    try {
                        await addDoc(collection(db, 'stations'), {
                            name, lat: parseFloat(lat), lng: parseFloat(lng), riddle, createdAt: new Date().toISOString()
                        });
                        showToast("Station hinzugefügt!");
                        setName(''); setLat(''); setLng(''); setRiddle('');
                    } catch (error) {
                        alert("Speichern blockiert! Hast du die Firestore Rules richtig konfiguriert?");
                    }
                };

                const handleDelete = async (id) => {
                    if(window.confirm("Wirklich löschen?")) {
                        await deleteDoc(doc(db, 'stations', id));
                        showToast("Station gelöscht.");
                    }
                };

                return (
                    <div className="min-h-screen bg-gray-100 p-8">
                        <div className="max-w-3xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h2 className="text-3xl font-bold text-gray-800">Admin Dashboard</h2>
                                    <p className="text-sm text-gray-500">Eingeloggt als: {adminUser.email}</p>
                                </div>
                                <div className="space-x-4">
                                    <button onClick={() => setView(window.innerWidth > 768 ? 'desktop' : 'player')} className="text-blue-600 font-medium">Zur App</button>
                                    <button onClick={handleLogout} className="text-red-500 font-medium border border-red-500 px-3 py-1 rounded-lg">Logout</button>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm mb-8 border">
                                <h3 className="text-xl font-bold mb-4">Neue Station anlegen</h3>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Name der Station" className="w-full border p-3 rounded-xl" required />
                                    <div className="flex gap-4">
                                        <input type="number" step="any" value={lat} onChange={e => setLat(e.target.value)} placeholder="Breitengrad (Latitude)" className="w-1/2 border p-3 rounded-xl" required />
                                        <input type="number" step="any" value={lng} onChange={e => setLng(e.target.value)} placeholder="Längengrad (Longitude)" className="w-1/2 border p-3 rounded-xl" required />
                                    </div>
                                    <textarea value={riddle} onChange={e => setRiddle(e.target.value)} placeholder="Aufgabe / Rätsel vor Ort" className="w-full border p-3 rounded-xl h-24" required />
                                    <button type="submit" className="w-full bg-iosBlue text-white font-bold py-3 rounded-xl">Speichern</button>
                                </form>
                            </div>

                            <h3 className="text-xl font-bold mb-4">Aktuelle Stationen ({stations.length})</h3>
                            <div className="space-y-3">
                                {stations.map(station => (
                                    <div key={station.id} className="bg-white p-4 rounded-xl flex justify-between items-center border">
                                        <div>
                                            <h4 className="font-bold">{station.name}</h4>
                                            <p className="text-sm text-gray-500">Lat: {station.lat} | Lng: {station.lng}</p>
                                        </div>
                                        <button onClick={() => handleDelete(station.id)} className="text-red-500 bg-red-50 p-2 rounded-lg"><IconTrash /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- SPIELER ANSICHT (Unverändert gut) ---
            const PlayerView = () => {
                const [userLoc, setUserLoc] = React.useState(null);
                const [gpsError, setGpsError] = React.useState(null);

                React.useEffect(() => {
                    if (!("geolocation" in navigator)) { setGpsError("GPS nicht unterstützt."); return; }
                    const watchId = navigator.geolocation.watchPosition(
                        (pos) => { setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setGpsError(null); },
                        (err) => { setGpsError("Bitte erlaube den Standortzugriff."); },
                        { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
                    );
                    return () => navigator.geolocation.clearWatch(watchId);
                }, []);

                const getDistance = (lat1, lon1, lat2, lon2) => {
                    const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                    const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                    const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                };

                return (
                    <div className="flex flex-col h-screen bg-iosBg relative">
                        <header className="bg-white/80 backdrop-blur-md pt-12 pb-3 px-4 border-b sticky top-0 z-10 flex justify-between items-center">
                            <div className="w-8"></div>
                            <div className="text-center">
                                <h1 className="text-xl font-bold text-black tracking-tight">Dorf-Rallye</h1>
                                {userLoc ? <span className="text-[10px] text-green-500 font-medium uppercase">GPS aktiv</span> : <span className="text-[10px] text-orange-500 font-medium uppercase">{gpsError || "Suche GPS..."}</span>}
                            </div>
                            <button onClick={() => setView('login')} className="text-xs text-iosBlue font-medium">Admin</button>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
                            {stations.length === 0 ? (
                                <div className="text-center text-gray-500 mt-10"><p>Rallye startet bald!</p></div>
                            ) : (
                                stations.map(station => {
                                    const dist = userLoc ? getDistance(userLoc.lat, userLoc.lng, station.lat, station.lng) : null;
                                    const isClose = dist !== null && dist <= 30;

                                    return (
                                        <div key={station.id} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                            <div className="flex items-center space-x-3 mb-3">
                                                <div className="bg-iosBlue/10 p-2 rounded-full text-iosBlue"><IconMapPin /></div>
                                                <h2 className="text-lg font-bold text-black">{station.name}</h2>
                                            </div>
                                            {dist !== null && <p className="text-sm text-gray-500 font-medium mb-4">Distanz: {Math.round(dist)} Meter</p>}
                                            {isClose ? (
                                                <div className="bg-green-50 rounded-xl p-4 border border-green-100 mt-2">
                                                    <div className="flex items-center text-green-600 font-bold mb-2 space-x-2"><IconUnlock /><span>Freigeschaltet!</span></div>
                                                    <p className="text-gray-800 text-sm">{station.riddle}</p>
                                                </div>
                                            ) : (
                                                <div className="bg-gray-50 rounded-xl p-4 border mt-2 flex items-start space-x-3">
                                                    <div className="text-gray-400 mt-1"><IconLock /></div>
                                                    <p className="text-gray-500 text-sm">Gehe näher heran (max. 30m).</p>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })
                            )}
                        </main>
                    </div>
                );
            };

            const Toast = () => {
                if (!toast) return null;
                return <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-bounce">{toast}</div>;
            }

            if (view === 'loading') return <div className="min-h-screen flex items-center justify-center bg-gray-100">Lade App...</div>;

            return (
                <div>
                    {view === 'desktop' && <DesktopView />}
                    {view === 'login' && <LoginView />}
                    {view === 'admin' && <AdminView />}
                    {view === 'player' && <PlayerView />}
                    <Toast />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
