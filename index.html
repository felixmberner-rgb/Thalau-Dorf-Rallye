<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dorf-Rallye Thalau</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Darkmode aktiviert
            theme: { extend: { colors: { iosBlue: '#0A84FF', iosBg: '#000000', darkCard: '#1C1C1E' } } }
        }
    </script>

    <!-- Leaflet Karte für den Admin-Bereich hinzufügen -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .timeline-line { position: absolute; left: 50%; transform: translateX(-50%); width: 4px; background: #333; top: 0; bottom: 0; z-index: 0; }
        .leaflet-container { z-index: 1 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpsE5x-nKFHk8fn_v85_1qseZaOXzGil0",
            authDomain: "dorf-rallye.firebaseapp.com",
            projectId: "dorf-rallye",
            storageBucket: "dorf-rallye.firebasestorage.app",
            messagingSenderId: "816087472841",
            appId: "1:816087472841:web:daacaf4554b37ce9a6cb18",
            measurementId: "G-M6E4P73X60"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Icons
        const IconMapPin = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconLock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconUnlock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const IconTrash = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconPlay = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconCheck = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10B981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;

        function App() {
            const [adminUser, setAdminUser] = React.useState(null);
            const [view, setView] = React.useState('loading'); 
            const [tours, setTours] = React.useState([]);
            const [allStations, setAllStations] = React.useState([]);
            const [activeTourId, setActiveTourId] = React.useState(null); // Für Player & Admin
            const [toast, setToast] = React.useState(null);

            // 1. Auth Listener
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setAdminUser(currentUser);
                    checkDevice(); 
                });
                const checkDevice = () => { setView(window.innerWidth > 768 ? 'desktop' : 'player_tours'); };
                window.addEventListener('resize', checkDevice);
                return () => { unsubscribe(); window.removeEventListener('resize', checkDevice); };
            }, []);

            // 2. Touren & Stationen aus Firebase laden
            React.useEffect(() => {
                const unsubTours = onSnapshot(collection(db, 'tours'), (snap) => setTours(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubStations = onSnapshot(collection(db, 'stations'), (snap) => {
                    // Sortiere Stationen nach Erstellungsdatum (Reihenfolge)
                    const st = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order);
                    setAllStations(st);
                });
                return () => { unsubTours(); unsubStations(); };
            }, []);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            // --- DESKTOP ANSICHT ---
            const DesktopView = () => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-white">
                        <div className="bg-darkCard p-10 rounded-3xl shadow-2xl max-w-md text-center border border-gray-800">
                            <h1 className="text-3xl font-bold mb-4 text-white">Dorfrallye Manager</h1>
                            <p className="text-gray-400 mb-8">Scanne den QR-Code mit dem Handy, um die Tour zu starten.</p>
                            <div className="flex justify-center mb-8"><img src={qrUrl} alt="QR Code" className="rounded-xl shadow-md border-4 border-white" /></div>
                            <button onClick={() => setView('login')} className="w-full bg-iosBlue text-white font-semibold py-3 px-4 rounded-xl">Admin Login</button>
                        </div>
                    </div>
                );
            };

            // --- LOGIN BEREICH ---
            const LoginView = () => {
                const [email, setEmail] = React.useState('');
                const [password, setPassword] = React.useState('');
                const [error, setError] = React.useState('');
                if (adminUser) { setView('admin_tours'); return null; }

                const handleLogin = async (e) => {
                    e.preventDefault();
                    try { await signInWithEmailAndPassword(auth, email, password); showToast("Eingeloggt!"); setView('admin_tours'); }
                    catch (err) { setError("Login fehlgeschlagen."); }
                };
                return (
                    <div className="min-h-screen bg-gray-900 flex items-center justify-center p-6 text-white">
                        <div className="bg-darkCard p-8 rounded-2xl shadow-lg max-w-md w-full border border-gray-800">
                            <h2 className="text-2xl font-bold mb-6 text-center">Admin Login</h2>
                            {error && <p className="bg-red-900/50 text-red-400 p-3 rounded-xl mb-4 text-sm border border-red-900">{error}</p>}
                            <form onSubmit={handleLogin} className="space-y-4 text-black">
                                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3 rounded-xl bg-gray-100" placeholder="E-Mail" required />
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 rounded-xl bg-gray-100" placeholder="Passwort" required />
                                <button type="submit" className="w-full bg-iosBlue text-white font-bold py-3 rounded-xl">Einloggen</button>
                            </form>
                            <button onClick={() => setView(window.innerWidth > 768 ? 'desktop' : 'player_tours')} className="mt-4 w-full text-gray-500 text-sm">Zurück</button>
                        </div>
                    </div>
                );
            };

            // --- ADMIN: TOUREN ÜBERSICHT ---
            const AdminToursView = () => {
                const [tourName, setTourName] = React.useState('');
                if (!adminUser) { setView('login'); return null; }

                const createTour = async (e) => {
                    e.preventDefault();
                    await addDoc(collection(db, 'tours'), { name: tourName, createdAt: Date.now() });
                    setTourName(''); showToast("Tour erstellt!");
                };

                return (
                    <div className="min-h-screen bg-gray-900 p-8 text-white">
                        <div className="max-w-3xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-3xl font-bold">Touren verwalten</h2>
                                <button onClick={() => {signOut(auth); setView('desktop');}} className="text-red-400 border border-red-500 px-3 py-1 rounded-lg">Logout</button>
                            </div>
                            
                            <form onSubmit={createTour} className="bg-darkCard p-6 rounded-2xl mb-8 flex gap-4 border border-gray-800">
                                <input type="text" value={tourName} onChange={e=>setTourName(e.target.value)} placeholder="Name der neuen Tour (z.B. Historische Route)" className="flex-1 p-3 rounded-xl text-black" required />
                                <button type="submit" className="bg-iosBlue px-6 rounded-xl font-bold">Erstellen</button>
                            </form>

                            <div className="space-y-4">
                                {tours.map(tour => (
                                    <div key={tour.id} className="bg-darkCard p-5 rounded-xl border border-gray-800 flex justify-between items-center">
                                        <h3 className="text-xl font-bold">{tour.name}</h3>
                                        <button onClick={() => { setActiveTourId(tour.id); setView('admin_stations'); }} className="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm font-medium">Stationen bearbeiten →</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- ADMIN: STATIONEN FÜR EINE TOUR (MIT KARTE) ---
            const AdminStationsView = () => {
                const [name, setName] = React.useState('');
                const [lat, setLat] = React.useState('');
                const [lng, setLng] = React.useState('');
                const [riddle, setRiddle] = React.useState('');
                const [mediaUrl, setMediaUrl] = React.useState('');
                
                const activeTour = tours.find(t => t.id === activeTourId);
                const stationsForTour = allStations.filter(s => s.tourId === activeTourId);
                const mapRef = React.useRef(null);

                // Leaflet Map Initialisierung
                React.useEffect(() => {
                    if (!mapRef.current) {
                        const map = L.map('admin-map').setView([50.418, 9.757], 14); // Thalau Zentrum ca.
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OS' }).addTo(map);
                        
                        let marker;
                        map.on('click', function(e) {
                            setLat(e.latlng.lat.toFixed(5));
                            setLng(e.latlng.lng.toFixed(5));
                            if(marker) map.removeLayer(marker);
                            marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
                        });
                        mapRef.current = map;
                    }
                }, []);

                const handleAdd = async (e) => {
                    e.preventDefault();
                    if(!lat || !lng) { alert("Bitte klicke zuerst auf die Karte für den Standort!"); return; }
                    await addDoc(collection(db, 'stations'), {
                        tourId: activeTourId, name, lat: parseFloat(lat), lng: parseFloat(lng), 
                        riddle, mediaUrl, order: Date.now() // Simple Sortierung
                    });
                    showToast("Station gespeichert!");
                    setName(''); setLat(''); setLng(''); setRiddle(''); setMediaUrl('');
                };

                return (
                    <div className="min-h-screen bg-gray-900 p-8 text-white pb-24">
                        <div className="max-w-4xl mx-auto">
                            <button onClick={() => setView('admin_tours')} className="text-iosBlue mb-4 font-medium">← Zurück zu Touren</button>
                            <h2 className="text-2xl font-bold mb-6">Stationen: {activeTour?.name}</h2>

                            <div className="bg-darkCard p-6 rounded-2xl mb-8 border border-gray-800">
                                <h3 className="text-lg font-bold mb-2">1. Standort auf Karte antippen</h3>
                                <div id="admin-map" className="h-64 w-full rounded-xl mb-4 bg-gray-200"></div>
                                
                                <form onSubmit={handleAdd} className="space-y-4 text-black">
                                    <div className="flex gap-4">
                                        <input type="text" value={lat} readOnly placeholder="Breitengrad" className="w-1/2 p-3 rounded-xl bg-gray-200 text-gray-600" />
                                        <input type="text" value={lng} readOnly placeholder="Längengrad" className="w-1/2 p-3 rounded-xl bg-gray-200 text-gray-600" />
                                    </div>
                                    <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Name der Station" className="w-full p-3 rounded-xl bg-gray-100" required />
                                    <input type="url" value={mediaUrl} onChange={e=>setMediaUrl(e.target.value)} placeholder="Link zu Bild oder YouTube-Video (Optional)" className="w-full p-3 rounded-xl bg-gray-100" />
                                    <textarea value={riddle} onChange={e=>setRiddle(e.target.value)} placeholder="Das Rätsel / Die Erklärung vor Ort" className="w-full p-3 rounded-xl h-24 bg-gray-100" required />
                                    <button type="submit" className="w-full bg-iosBlue text-white font-bold py-3 rounded-xl">Station hinzufügen</button>
                                </form>
                            </div>

                            <div className="space-y-3">
                                {stationsForTour.map((st, idx) => (
                                    <div key={st.id} className="bg-darkCard p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                                        <div><span className="text-gray-500 mr-2">#{idx+1}</span><strong className="text-lg">{st.name}</strong></div>
                                        <button onClick={() => deleteDoc(doc(db, 'stations', st.id))} className="text-red-500 bg-red-900/30 p-2 rounded-lg"><IconTrash /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- SPIELER: TOUREN AUSWAHL ---
            const PlayerToursView = () => {
                return (
                    <div className="min-h-screen bg-black text-white p-6">
                        <h1 className="text-3xl font-bold mb-8 mt-10 text-center">Willkommen in Thalau</h1>
                        <p className="text-gray-400 text-center mb-10">Wähle eine Dorfrallye aus, um zu starten.</p>
                        <div className="space-y-4">
                            {tours.map(tour => (
                                <button key={tour.id} onClick={() => { setActiveTourId(tour.id); setView('player_game'); }} 
                                        className="w-full bg-darkCard p-6 rounded-2xl border border-gray-800 flex items-center justify-between text-left active:scale-95 transition-transform">
                                    <span className="text-xl font-bold">{tour.name}</span>
                                    <div className="bg-iosBlue/20 text-iosBlue p-3 rounded-full"><IconPlay /></div>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => setView('login')} className="absolute bottom-6 left-1/2 -translate-x-1/2 text-gray-600 text-xs">Admin Bereich</button>
                    </div>
                );
            };

            // --- SPIELER: DAS HAUPTSPIEL (THALAU HINTERGRUND & SCHLINGERPFAD) ---
            const PlayerGameView = () => {
                const [userLoc, setUserLoc] = React.useState(null);
                const tourStations = allStations.filter(s => s.tourId === activeTourId);
                
                React.useEffect(() => {
                    if (!("geolocation" in navigator)) return;
                    const watchId = navigator.geolocation.watchPosition(
                        (pos) => setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => console.log("GPS err", err),
                        { enableHighAccuracy: true }
                    );
                    return () => navigator.geolocation.clearWatch(watchId);
                }, []);

                const getDistance = (lat1, lon1, lat2, lon2) => {
                    const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                    const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                    const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                };

                // Finde heraus, welche Station die "aktuelle" ist (die erste, die noch nicht gelöst wurde)
                // Da wir in einer Web-App ohne Nutzer-Login für Spieler sind, machen wir das rein über die Distanz.
                // Logik: Station ist freigeschaltet, wenn man nah ist.
                
                return (
                    <div className="min-h-screen bg-black text-white relative bg-cover bg-center bg-fixed" 
                         style={{backgroundImage: 'url(https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG)'}}>
                        
                        {/* Dunkler Overlay für Lesbarkeit */}
                        <div className="absolute inset-0 bg-black/70 backdrop-blur-[2px] z-0"></div>

                        {/* FIXER HEADER - Ovaler Button-Style */}
                        <header className="fixed top-0 w-full z-50 pt-10 pb-4 flex justify-center">
                            <div className="bg-black/90 border border-gray-700 backdrop-blur-md rounded-full px-8 py-3 shadow-2xl flex flex-col items-center">
                                <h1 className="text-xl font-bold tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-iosBlue">
                                    Dorfrallye Thalau
                                </h1>
                                {userLoc ? <span className="text-[9px] text-green-400 tracking-wider uppercase mt-1">GPS verbunden</span> : <span className="text-[9px] text-orange-400 tracking-wider uppercase mt-1">Suche Satelliten...</span>}
                            </div>
                            <button onClick={()=>setView('player_tours')} className="absolute left-4 top-12 text-white/50 text-sm">Zurück</button>
                        </header>

                        <main className="relative z-10 pt-36 pb-24 px-4 overflow-x-hidden">
                            <div className="relative max-w-md mx-auto">
                                {/* Die Mittellinie für den Schlingerpfad */}
                                <div className="timeline-line"></div>

                                {tourStations.map((station, index) => {
                                    const dist = userLoc ? getDistance(userLoc.lat, userLoc.lng, station.lat, station.lng) : null;
                                    const isClose = dist !== null && dist <= 30;
                                    const isLeft = index % 2 === 0;

                                    // Prüfe ob Video oder Bild
                                    const isVideo = station.mediaUrl && (station.mediaUrl.includes('youtube') || station.mediaUrl.includes('youtu.be') || station.mediaUrl.includes('.mp4'));

                                    return (
                                        <div key={station.id} className={`flex items-center w-full my-12 relative ${isLeft ? 'flex-row' : 'flex-row-reverse'}`}>
                                            
                                            {/* Der Knotenpunkt in der Mitte */}
                                            <div className={`absolute left-1/2 -translate-x-1/2 w-10 h-10 rounded-full flex items-center justify-center border-4 border-black z-10 shadow-lg transition-colors ${isClose ? 'bg-green-500' : 'bg-gray-800 text-gray-500'}`}>
                                                {isClose ? <IconCheck /> : <IconLock />}
                                            </div>

                                            {/* Die Info-Karte (Links oder Rechts) */}
                                            <div className={`w-1/2 ${isLeft ? 'pr-8 text-right' : 'pl-8 text-left'}`}>
                                                <div className={`p-4 rounded-2xl border backdrop-blur-md shadow-xl transition-all ${isClose ? 'bg-darkCard/90 border-green-500/50' : 'bg-black/60 border-gray-800'}`}>
                                                    <h2 className="font-bold text-lg mb-1">{station.name}</h2>
                                                    
                                                    {dist !== null && !isClose && (
                                                        <span className="text-xs text-gray-400 font-medium bg-gray-900 px-2 py-1 rounded-md inline-block">
                                                            Noch {Math.round(dist)}m
                                                        </span>
                                                    )}

                                                    {isClose ? (
                                                        <div className="mt-3 text-sm text-gray-200">
                                                            {station.mediaUrl && isVideo && (
                                                                <div className="mb-3 rounded-lg overflow-hidden border border-gray-700">
                                                                    <a href={station.mediaUrl} target="_blank" className="text-iosBlue underline text-xs">Video ansehen (Klick)</a>
                                                                </div>
                                                            )}
                                                            {station.mediaUrl && !isVideo && (
                                                                <img src={station.mediaUrl} className="w-full rounded-lg mb-3 border border-gray-700" alt="Station" />
                                                            )}
                                                            <p className="leading-relaxed">{station.riddle}</p>
                                                        </div>
                                                    ) : (
                                                        <p className="text-xs text-gray-500 mt-2">Gehe zum Ort, um das Rätsel zu öffnen.</p>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </main>
                    </div>
                );
            };

            const Toast = () => toast ? <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[100] border border-gray-600">{toast}</div> : null;

            if (view === 'loading') return <div className="min-h-screen bg-black flex items-center justify-center text-gray-500">Lade Thalau...</div>;

            return (
                <div>
                    {view === 'desktop' && <DesktopView />}
                    {view === 'login' && <LoginView />}
                    {view === 'admin_tours' && <AdminToursView />}
                    {view === 'admin_stations' && <AdminStationsView />}
                    {view === 'player_tours' && <PlayerToursView />}
                    {view === 'player_game' && <PlayerGameView />}
                    <Toast />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
