<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dorf-Rallye Thalau</title>
    
    <!-- PWA & Apple Touch Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        iosBlue: '#0A84FF', 
                        iosBg: '#000000', 
                        darkCard: '#1C1C1E',
                        darkCardSecondary: '#2C2C2E'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                } 
            }
        }
    </script>

    <!-- Leaflet Map für Admin -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            background-color: #000000; 
            color: white; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none; 
            margin: 0;
            padding: 0;
            /* Support for notches/safe areas */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Timeline styling */
        .timeline-container {
            position: relative;
            padding-top: 2rem;
            padding-bottom: 6rem;
        }
        .timeline-line { 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 2px; 
            background: #333; 
            top: 0; 
            bottom: 0; 
            z-index: 0; 
        }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        
        /* Utility */
        .glass-panel {
            background: rgba(28, 28, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .leaflet-container { z-index: 1 !important; }
        
        /* Smooth scrolling fade effect */
        .scroll-fade-overlay {
            position: fixed;
            top: 250px; /* Adjust based on header height */
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%);
            z-index: 15;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBpsE5x-nKFHk8fn_v85_1qseZaOXzGil0",
            authDomain: "dorf-rallye.firebaseapp.com",
            projectId: "dorf-rallye",
            storageBucket: "dorf-rallye.firebasestorage.app",
            messagingSenderId: "816087472841",
            appId: "1:816087472841:web:daacaf4554b37ce9a6cb18",
            measurementId: "G-M6E4P73X60"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // ICONS (Custom SVGs for perfect sizing)
        // ==========================================
        const IconLock = ({className}) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconUnlock = ({className}) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const IconCheck = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconClock = ({className}) => <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconMapPin = ({className}) => <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconCompass = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>;
        const IconChevronLeft = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconShare = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline mb-1 mx-1"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;
        const IconX = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        // ==========================================
        // PWA INSTALL PROMPT
        // ==========================================
        const InstallPrompt = () => {
            const [show, setShow] = React.useState(false);
            React.useEffect(() => {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                const dismissed = localStorage.getItem('pwaPromptDismissed');
                // Show if on mobile, not installed, and not previously dismissed
                if (!isStandalone && !dismissed && window.innerWidth < 768) {
                    setTimeout(() => setShow(true), 2500); 
                }
            }, []);

            if (!show) return null;
            return (
                <div className="fixed bottom-6 left-4 right-4 bg-darkCardSecondary/95 backdrop-blur-xl border border-gray-700 text-white p-4 rounded-2xl shadow-2xl z-[100] flex justify-between items-start animate-slide-up">
                    <div className="text-sm flex-1 pr-2">
                        <strong className="block mb-1 text-base text-iosBlue">App installieren</strong>
                        <span className="opacity-80 text-xs leading-tight">Tippe auf Teilen <IconShare /> und "Zum Home-Bildschirm" für das beste Erlebnis ohne Browser-Leisten.</span>
                    </div>
                    <button onClick={() => { setShow(false); localStorage.setItem('pwaPromptDismissed', 'true'); }} className="p-2 bg-black/40 rounded-full flex-shrink-0 active:scale-95 transition-transform"><IconX /></button>
                </div>
            );
        };

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [adminUser, setAdminUser] = React.useState(null);
            const [view, setView] = React.useState('loading'); 
            const [activeTourId, setActiveTourId] = React.useState(null);
            
            const [tours, setTours] = React.useState([]);
            const [allStations, setAllStations] = React.useState([]);
            const [toast, setToast] = React.useState(null);
            const [scrollY, setScrollY] = React.useState(0);

            // Restore state from sessionStorage on load
            React.useEffect(() => {
                const savedView = sessionStorage.getItem('currentView');
                const savedTourId = sessionStorage.getItem('activeTourId');
                if (savedView && savedView !== 'loading') {
                    setView(savedView);
                    if (savedTourId) setActiveTourId(savedTourId);
                }
                
                const handleScroll = () => setScrollY(window.scrollY);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Handle View Changes & Save to Session
            const changeView = (newView, tourId = null) => {
                setView(newView);
                sessionStorage.setItem('currentView', newView);
                if (tourId !== undefined) {
                    setActiveTourId(tourId);
                    if (tourId) sessionStorage.setItem('activeTourId', tourId);
                    else sessionStorage.removeItem('activeTourId');
                }
                window.scrollTo(0,0); // Reset scroll on view change
            };

            // Auth & Data Listeners
            React.useEffect(() => {
                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                    setAdminUser(currentUser);
                    if (view === 'loading') {
                        if (window.innerWidth > 768) changeView('desktop');
                        else changeView('player_tours');
                    }
                });

                const unsubTours = onSnapshot(collection(db, 'tours'), (snap) => setTours(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubStations = onSnapshot(collection(db, 'stations'), (snap) => {
                    setAllStations(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order));
                });

                return () => { unsubscribeAuth(); unsubTours(); unsubStations(); };
            }, [view]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            // Helper: Haversine distance
            const getDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
            };

            // ==========================================
            // DESKTOP / LOGIN VIEWS
            // ==========================================
            const DesktopView = () => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`;
                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-6 text-white">
                        <div className="bg-darkCard p-10 rounded-[2rem] shadow-2xl max-w-md text-center border border-gray-800">
                            <h1 className="text-3xl font-bold mb-4">Dorfrallye Thalau</h1>
                            <p className="text-gray-400 mb-8 text-sm">Bitte scanne den Code mit deinem Smartphone, um die App zu nutzen.</p>
                            <div className="bg-white p-4 rounded-2xl mb-8 inline-block"><img src={qrUrl} alt="QR" className="w-48 h-48" /></div>
                            <button onClick={() => changeView('login')} className="w-full bg-darkCardSecondary text-gray-300 font-medium py-3 px-4 rounded-xl hover:bg-gray-700 transition">Admin Login</button>
                        </div>
                    </div>
                );
            };

            const LoginView = () => {
                const [email, setEmail] = React.useState('');
                const [password, setPassword] = React.useState('');
                const [error, setError] = React.useState('');
                
                if (adminUser) { setTimeout(() => changeView('admin_tours'), 0); return null; }

                const handleLogin = async (e) => {
                    e.preventDefault();
                    try { await signInWithEmailAndPassword(auth, email, password); showToast("Eingeloggt!"); changeView('admin_tours'); }
                    catch (err) { setError("Login fehlgeschlagen."); }
                };
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center p-6">
                        <div className="bg-darkCard p-8 rounded-[2rem] shadow-xl max-w-md w-full border border-gray-800">
                            <h2 className="text-2xl font-bold mb-6 text-center">Admin Login</h2>
                            {error && <p className="bg-red-900/30 text-red-400 p-3 rounded-xl mb-4 text-sm text-center">{error}</p>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-4 rounded-xl bg-black border border-gray-700 text-white outline-none focus:border-iosBlue" placeholder="E-Mail" required />
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-4 rounded-xl bg-black border border-gray-700 text-white outline-none focus:border-iosBlue" placeholder="Passwort" required />
                                <button type="submit" className="w-full bg-iosBlue text-white font-bold py-4 rounded-xl mt-2">Einloggen</button>
                            </form>
                            <button onClick={() => changeView(window.innerWidth > 768 ? 'desktop' : 'player_tours')} className="mt-6 w-full text-gray-500 text-sm">Zurück</button>
                        </div>
                    </div>
                );
            };

            // ==========================================
            // ADMIN: TOURS VIEW
            // ==========================================
            const AdminToursView = () => {
                const [editingId, setEditingId] = React.useState(null);
                const [formData, setFormData] = React.useState({ name: '', description: '', duration: '', length: '', imageUrl: '' });

                if (!adminUser) { setTimeout(() => changeView('login'), 0); return null; }

                const handleSave = async (e) => {
                    e.preventDefault();
                    try {
                        if (editingId) {
                            await updateDoc(doc(db, 'tours', editingId), formData);
                            showToast("Tour aktualisiert!");
                        } else {
                            await addDoc(collection(db, 'tours'), { ...formData, createdAt: Date.now() });
                            showToast("Tour erstellt!");
                        }
                        setEditingId(null); setFormData({ name: '', description: '', duration: '', length: '', imageUrl: '' });
                    } catch (err) { alert("Fehler: " + err.message); }
                };

                const editTour = (tour) => {
                    setEditingId(tour.id);
                    setFormData({ name: tour.name, description: tour.description || '', duration: tour.duration || '', length: tour.length || '', imageUrl: tour.imageUrl || '' });
                    window.scrollTo(0,0);
                };

                return (
                    <div className="min-h-screen bg-black p-6 pb-24">
                        <div className="max-w-3xl mx-auto space-y-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-2xl font-bold">Routen Verwaltung</h2>
                                <button onClick={() => {signOut(auth); changeView('desktop');}} className="text-red-500 text-sm font-medium">Logout</button>
                            </div>
                            
                            <form onSubmit={handleSave} className="bg-darkCard p-6 rounded-[2rem] border border-gray-800">
                                <h3 className="text-lg font-bold mb-4">{editingId ? 'Route bearbeiten' : 'Neue Route'}</h3>
                                <div className="space-y-4">
                                    <input type="text" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} placeholder="Name (z.B. Historische Tour)" className="w-full p-4 rounded-xl bg-black border border-gray-700 outline-none focus:border-iosBlue" required />
                                    <textarea value={formData.description} onChange={e=>setFormData({...formData, description: e.target.value})} placeholder="Kurze Beschreibung..." className="w-full p-4 rounded-xl bg-black border border-gray-700 outline-none focus:border-iosBlue h-24" />
                                    <div className="flex gap-4">
                                        <input type="text" value={formData.duration} onChange={e=>setFormData({...formData, duration: e.target.value})} placeholder="Dauer (z.B. 2h)" className="w-1/2 p-4 rounded-xl bg-black border border-gray-700 outline-none" />
                                        <input type="text" value={formData.length} onChange={e=>setFormData({...formData, length: e.target.value})} placeholder="Länge (z.B. 5km)" className="w-1/2 p-4 rounded-xl bg-black border border-gray-700 outline-none" />
                                    </div>
                                    <input type="url" value={formData.imageUrl} onChange={e=>setFormData({...formData, imageUrl: e.target.value})} placeholder="Hintergrundbild URL (Optional)" className="w-full p-4 rounded-xl bg-black border border-gray-700 outline-none" />
                                    
                                    <div className="flex gap-3 pt-2">
                                        <button type="submit" className="flex-1 bg-iosBlue text-white font-bold py-4 rounded-xl">{editingId ? 'Speichern' : 'Hinzufügen'}</button>
                                        {editingId && <button type="button" onClick={() => {setEditingId(null); setFormData({name:'', description:'', duration:'', length:'', imageUrl:''});}} className="px-6 bg-darkCardSecondary rounded-xl font-medium">Abbruch</button>}
                                    </div>
                                </div>
                            </form>

                            <div className="space-y-3">
                                {tours.map(tour => (
                                    <div key={tour.id} className="bg-darkCard p-5 rounded-2xl border border-gray-800 flex justify-between items-center">
                                        <div>
                                            <h4 className="font-bold text-lg">{tour.name}</h4>
                                            <div className="text-xs text-gray-500 flex gap-3 mt-1">
                                                <span>{tour.duration}</span><span>{tour.length}</span>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => editTour(tour)} className="p-2 bg-gray-800 rounded-lg"><IconEdit /></button>
                                            <button onClick={() => changeView('admin_stations', tour.id)} className="px-4 py-2 bg-iosBlue text-white font-medium rounded-lg text-sm">Stationen</button>
                                            <button onClick={() => {if(window.confirm("Löschen?")) deleteDoc(doc(db, 'tours', tour.id));}} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><IconTrash /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // ==========================================
            // ADMIN: STATIONS VIEW
            // ==========================================
            const AdminStationsView = () => {
                const activeTour = tours.find(t => t.id === activeTourId);
                const tourStations = allStations.filter(s => s.tourId === activeTourId);
                
                const [editingId, setEditingId] = React.useState(null);
                const [fd, setFd] = React.useState({ name: '', lat: '', lng: '', infoText: '', hasQuiz: false, question: '', a1: '', a2: '', a3: '', a4: '', correctIndex: 0 });
                const mapRef = React.useRef(null);
                const markerRef = React.useRef(null);

                if (!adminUser) { setTimeout(() => changeView('login'), 0); return null; }

                React.useEffect(() => {
                    if (!mapRef.current) {
                        const map = L.map('admin-map').setView([50.418, 9.757], 14); 
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OS' }).addTo(map);
                        map.on('click', (e) => {
                            setFd(prev => ({ ...prev, lat: e.latlng.lat.toFixed(5), lng: e.latlng.lng.toFixed(5) }));
                            if(markerRef.current) map.removeLayer(markerRef.current);
                            markerRef.current = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
                        });
                        mapRef.current = map;
                    }
                }, []);

                const handleSave = async (e) => {
                    e.preventDefault();
                    if(!fd.lat || !fd.lng) return alert("Standort auf Karte wählen!");
                    
                    const answers = [fd.a1, fd.a2, fd.a3, fd.a4].filter(a => a.trim() !== '');
                    if (fd.hasQuiz && answers.length < 2) return alert("Min. 2 Antworten fürs Quiz!");

                    const data = {
                        tourId: activeTourId, name: fd.name, lat: parseFloat(fd.lat), lng: parseFloat(fd.lng), infoText: fd.infoText,
                        hasQuiz: fd.hasQuiz, quiz: fd.hasQuiz ? { question: fd.question, answers, correctIndex: fd.correctIndex } : null
                    };

                    try {
                        if(editingId) { await updateDoc(doc(db, 'stations', editingId), data); showToast("Gespeichert"); }
                        else { await addDoc(collection(db, 'stations'), { ...data, order: Date.now() }); showToast("Hinzugefügt"); }
                        resetForm();
                    } catch(err) { alert("Fehler"); }
                };

                const editStation = (st) => {
                    setEditingId(st.id);
                    setFd({
                        name: st.name, lat: st.lat, lng: st.lng, infoText: st.infoText || '', hasQuiz: st.hasQuiz || false,
                        question: st.quiz?.question || '', a1: st.quiz?.answers[0] || '', a2: st.quiz?.answers[1] || '', a3: st.quiz?.answers[2] || '', a4: st.quiz?.answers[3] || '', correctIndex: st.quiz?.correctIndex || 0
                    });
                    if(mapRef.current) {
                        if(markerRef.current) mapRef.current.removeLayer(markerRef.current);
                        markerRef.current = L.marker([st.lat, st.lng]).addTo(mapRef.current);
                        mapRef.current.setView([st.lat, st.lng], 16);
                    }
                    window.scrollTo(0,0);
                };

                const resetForm = () => {
                    setEditingId(null); setFd({ name: '', lat: '', lng: '', infoText: '', hasQuiz: false, question: '', a1: '', a2: '', a3: '', a4: '', correctIndex: 0 });
                    if(markerRef.current && mapRef.current) mapRef.current.removeLayer(markerRef.current);
                };

                return (
                    <div className="min-h-screen bg-black p-6 pb-24">
                        <div className="max-w-3xl mx-auto">
                            <button onClick={() => changeView('admin_tours')} className="text-iosBlue mb-4 font-medium flex items-center"><IconChevronLeft /> Zurück</button>
                            <h2 className="text-2xl font-bold mb-6">Stationen: {activeTour?.name}</h2>

                            <div className="bg-darkCard p-6 rounded-[2rem] mb-8 border border-gray-800">
                                <h3 className="font-bold mb-4">{editingId ? 'Bearbeiten' : 'Neu anlegen'}</h3>
                                <div id="admin-map" className="h-48 w-full rounded-xl mb-4 z-0"></div>
                                
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="flex gap-4">
                                        <input type="text" value={fd.lat} readOnly placeholder="Lat" className="w-1/2 p-3 rounded-xl bg-black border border-gray-700 text-gray-500" />
                                        <input type="text" value={fd.lng} readOnly placeholder="Lng" className="w-1/2 p-3 rounded-xl bg-black border border-gray-700 text-gray-500" />
                                    </div>
                                    <input type="text" value={fd.name} onChange={e=>setFd({...fd, name:e.target.value})} placeholder="Stationsname" className="w-full p-4 rounded-xl bg-black border border-gray-700 outline-none focus:border-iosBlue" required />
                                    
                                    <label className="flex items-center space-x-3 p-4 bg-darkCardSecondary rounded-xl">
                                        <input type="checkbox" checked={fd.hasQuiz} onChange={e=>setFd({...fd, hasQuiz:e.target.checked})} className="w-5 h-5 accent-iosBlue" />
                                        <span className="font-medium">Quiz aktivieren</span>
                                    </label>

                                    {fd.hasQuiz && (
                                        <div className="p-4 bg-black rounded-xl border border-gray-800 space-y-3">
                                            <input type="text" value={fd.question} onChange={e=>setFd({...fd, question:e.target.value})} placeholder="Frage?" className="w-full p-3 rounded-lg bg-darkCard border border-gray-700" required />
                                            {[1,2,3,4].map(num => (
                                                <div key={num} className="flex items-center gap-2">
                                                    <input type="radio" name="correct" checked={fd.correctIndex === num-1} onChange={()=>setFd({...fd, correctIndex:num-1})} className="w-5 h-5 accent-green-500" />
                                                    <input type="text" value={fd[`a${num}`]} onChange={e=>setFd({...fd, [`a${num}`]:e.target.value})} placeholder={`Antwort ${num}`} className="w-full p-3 rounded-lg bg-darkCard border border-gray-700" required={num <= 2} />
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <textarea value={fd.infoText} onChange={e=>setFd({...fd, infoText:e.target.value})} placeholder={fd.hasQuiz ? "Auflösung / Infos nach dem Rätsel" : "Infos vor Ort"} className="w-full p-4 rounded-xl bg-black border border-gray-700 h-24 outline-none focus:border-iosBlue" required />
                                    
                                    <div className="flex gap-3 pt-2">
                                        <button type="submit" className="flex-1 bg-iosBlue text-white font-bold py-4 rounded-xl">{editingId ? 'Speichern' : 'Hinzufügen'}</button>
                                        {editingId && <button type="button" onClick={resetForm} className="px-6 bg-darkCardSecondary rounded-xl font-medium">Abbruch</button>}
                                    </div>
                                </form>
                            </div>

                            <div className="space-y-3">
                                {tourStations.map((st, idx) => (
                                    <div key={st.id} className="bg-darkCard p-4 rounded-2xl border border-gray-800 flex justify-between items-center">
                                        <div><span className="text-gray-500 mr-2">#{idx+1}</span><strong className="text-lg">{st.name}</strong></div>
                                        <div className="flex gap-2">
                                            <button onClick={() => editStation(st)} className="p-2 bg-gray-800 rounded-lg"><IconEdit /></button>
                                            <button onClick={() => {if(window.confirm("Löschen?")) deleteDoc(doc(db, 'stations', st.id));}} className="p-2 bg-red-900/30 text-red-500 rounded-lg"><IconTrash /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // ==========================================
            // PLAYER: TOURS (START PAGE)
            // ==========================================
            const PlayerToursView = () => {
                // Determine opacity based on scroll (max fade at 150px)
                const headerOpacity = Math.max(0, 1 - (scrollY / 150));
                
                return (
                    <div className="min-h-screen bg-black text-white relative">
                        <InstallPrompt />
                        
                        {/* Fixed Hero Header with fade on scroll */}
                        <div className="fixed top-0 left-0 right-0 h-64 z-10 pointer-events-none" style={{opacity: headerOpacity}}>
                             <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: 'url(https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG)' }}></div>
                             <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-black/60 to-black"></div>
                        </div>

                        {/* Title text overlay (scrolls up) */}
                        <div className="relative z-20 pt-20 pb-8 px-6 text-center">
                            <h1 className="text-4xl font-bold tracking-tight mb-2 text-shadow">Thalau Entdecken</h1>
                            <p className="text-gray-300 font-medium">Wähle deine Route</p>
                        </div>

                        {/* Tour Cards Content */}
                        <main className="relative z-20 px-4 pb-24 max-w-md mx-auto space-y-5">
                            {tours.map(tour => (
                                <button key={tour.id} onClick={() => changeView('player_game', tour.id)} 
                                     className="w-full text-left relative rounded-[2rem] overflow-hidden transform transition-transform active:scale-[0.98] border border-gray-800/50 bg-darkCard block">
                                    {tour.imageUrl ? (
                                        <div className="h-40 w-full bg-cover bg-center" style={{ backgroundImage: `url(${tour.imageUrl})` }}></div>
                                    ) : (
                                        <div className="h-24 w-full bg-gradient-to-br from-gray-800 to-gray-900"></div>
                                    )}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/90 to-transparent"></div>
                                    
                                    <div className="absolute bottom-0 left-0 w-full p-5 flex flex-col justify-end">
                                        <h2 className="text-2xl font-bold text-white mb-3 leading-tight drop-shadow-md">{tour.name}</h2>
                                        <div className="flex flex-wrap gap-2">
                                            {tour.duration && <span className="flex items-center gap-1.5 glass-panel px-3 py-1.5 rounded-full text-xs font-semibold text-gray-200"><IconClock className="w-3.5 h-3.5" /> {tour.duration}</span>}
                                            {tour.length && <span className="flex items-center gap-1.5 glass-panel px-3 py-1.5 rounded-full text-xs font-semibold text-gray-200"><IconMapPin className="w-3.5 h-3.5" /> {tour.length}</span>}
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </main>
                        
                        <button onClick={() => changeView('login')} className="absolute bottom-6 left-1/2 -translate-x-1/2 text-gray-700 text-xs font-medium z-30">Admin</button>
                    </div>
                );
            };

            // ==========================================
            // PLAYER: GAME VIEW (TIMELINE)
            // ==========================================
            const PlayerGameView = () => {
                const [userLoc, setUserLoc] = React.useState(null);
                const [solvedStations, setSolvedStations] = React.useState(() => JSON.parse(localStorage.getItem(`solved_${activeTourId}`) || '{}'));
                const [selectedAnswers, setSelectedAnswers] = React.useState({});
                const [quizErrors, setQuizErrors] = React.useState({});

                const activeTour = tours.find(t => t.id === activeTourId);
                const tourStations = allStations.filter(s => s.tourId === activeTourId);
                
                React.useEffect(() => {
                    if (!("geolocation" in navigator)) return;
                    const watchId = navigator.geolocation.watchPosition(
                        (pos) => setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => console.log("GPS", err),
                        { enableHighAccuracy: true }
                    );
                    return () => navigator.geolocation.clearWatch(watchId);
                }, []);

                const handleQuizCheck = (station) => {
                    const selIdx = selectedAnswers[station.id];
                    if (selIdx === undefined) return;
                    
                    if (selIdx === station.quiz.correctIndex) {
                        const newSolved = {...solvedStations, [station.id]: true};
                        setSolvedStations(newSolved);
                        localStorage.setItem(`solved_${activeTourId}`, JSON.stringify(newSolved));
                        setQuizErrors(prev => ({...prev, [station.id]: false}));
                    } else {
                        setQuizErrors(prev => ({...prev, [station.id]: true}));
                    }
                };

                // Determine active target station (first unsolved)
                const nextStationIdx = tourStations.findIndex(s => !solvedStations[s.id]);
                const nextStation = nextStationIdx !== -1 ? tourStations[nextStationIdx] : null;

                // Scroll opacity calculation for the hero header
                const headerOpacity = Math.max(0, 1 - (scrollY / 200));

                return (
                    <div className="min-h-screen bg-black text-white relative">
                        
                        {/* Fixed Hero Header with fade on scroll */}
                        <div className="fixed top-0 left-0 w-full h-[30vh] min-h-[250px] z-10 pointer-events-none transition-opacity duration-100" style={{opacity: headerOpacity}}>
                            <div className="absolute inset-0 bg-cover bg-center" style={{backgroundImage: `url(${activeTour?.imageUrl || 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Luftbild_Thalau.JPG/1920px-Luftbild_Thalau.JPG'})`}}></div>
                            {/* Gradient to blend image into the black background seamlessly */}
                            <div className="absolute inset-0 bg-gradient-to-b from-black/30 via-black/50 to-black"></div>
                        </div>

                        {/* Top Bar with Back Button (Fixed, high z-index) */}
                        <div className="fixed top-0 left-0 w-full z-40 p-4 pt-10 flex items-center justify-between">
                            <button onClick={()=>changeView('player_tours')} className="glass-panel p-2 rounded-full text-white active:scale-90 transition-transform">
                                <IconChevronLeft />
                            </button>
                            <div className="glass-panel px-4 py-1.5 rounded-full text-[10px] font-bold tracking-wider uppercase flex items-center gap-1.5">
                                {userLoc ? <span className="text-green-400">● GPS Aktiv</span> : <span className="text-orange-400 animate-pulse">● Suche GPS</span>}
                            </div>
                        </div>

                        {/* Main Content Area */}
                        <main className="relative z-20 pt-[25vh] pb-32 px-4 overflow-x-hidden">
                            <div className="text-center mb-12">
                                <h1 className="text-3xl font-bold text-white mb-2 leading-tight drop-shadow-lg px-4">{activeTour?.name}</h1>
                                {activeTour?.description && <p className="text-gray-300 text-sm max-w-sm mx-auto px-6">{activeTour.description}</p>}
                            </div>

                            <div className="relative max-w-md mx-auto timeline-container">
                                <div className="timeline-line"></div>

                                {tourStations.map((station, index) => {
                                    const isSolved = solvedStations[station.id];
                                    const isNextTarget = index === nextStationIdx;
                                    const isLocked = index > nextStationIdx && !isSolved;
                                    
                                    const dist = userLoc ? getDistance(userLoc.lat, userLoc.lng, station.lat, station.lng) : null;
                                    const inRange = dist !== null && dist <= 30;
                                    const isLeft = index % 2 === 0;

                                    // Render Logic based on state
                                    let nodeContent, cardStyle, cardContent;

                                    if (isSolved) {
                                        // SOLVED STATE
                                        nodeContent = <IconCheck className="w-6 h-6 text-black" />;
                                        cardStyle = "bg-darkCardSecondary border-green-500/30";
                                        cardContent = (
                                            <div className="animate-fade-in">
                                                <h2 className="font-bold text-lg leading-tight mb-2 text-white">{station.name}</h2>
                                                {station.hasQuiz && <div className="text-[10px] text-green-400 font-bold mb-3 uppercase tracking-wider">✓ Quiz gelöst</div>}
                                                <p className="text-sm text-gray-300 leading-relaxed">{station.infoText}</p>
                                            </div>
                                        );
                                    } else if (isNextTarget) {
                                        // ACTIVE TARGET STATE
                                        nodeContent = <div className="w-3 h-3 bg-iosBlue rounded-full animate-ping"></div>;
                                        cardStyle = inRange ? "bg-darkCard border-iosBlue shadow-[0_0_15px_rgba(10,132,255,0.2)]" : "glass-panel border-gray-600";
                                        
                                        cardContent = (
                                            <div className="animate-fade-in">
                                                <h2 className="font-bold text-lg leading-tight mb-1 text-white">{station.name}</h2>
                                                
                                                {!inRange && dist !== null && (
                                                    <div className="mt-3 bg-black/50 rounded-xl p-3 flex items-center gap-3">
                                                        <div className="bg-gray-800 p-2 rounded-full"><IconCompass className="w-5 h-5 text-gray-300" /></div>
                                                        <div className="text-sm">
                                                            <span className="block text-gray-400 text-xs">Zielort finden</span>
                                                            <span className="font-semibold text-white">Noch ca. {Math.round(dist)}m</span>
                                                        </div>
                                                    </div>
                                                )}

                                                {inRange && station.hasQuiz && (
                                                    <div className="mt-4 bg-black/60 rounded-xl p-4 border border-gray-700">
                                                        <p className="font-bold text-sm text-white mb-4">{station.quiz.question}</p>
                                                        <div className="space-y-2 mb-4">
                                                            {station.quiz.answers.map((ans, aIdx) => (
                                                                <button key={aIdx} onClick={() => {setSelectedAnswers(p=>({...p, [station.id]: aIdx})); setQuizErrors(p=>({...p, [station.id]: false}));}}
                                                                        className={`w-full text-left p-3 rounded-lg text-sm transition-all border ${selectedAnswers[station.id] === aIdx ? 'bg-iosBlue border-iosBlue text-white font-medium' : 'bg-darkCard border-gray-700 text-gray-300'}`}>
                                                                    {ans}
                                                                </button>
                                                            ))}
                                                        </div>
                                                        {quizErrors[station.id] && <p className="text-xs text-red-400 mb-3 font-medium text-center">Nicht ganz! Versuch es nochmal.</p>}
                                                        <button onClick={() => handleQuizCheck(station)} className="w-full bg-white text-black font-bold py-3 rounded-lg text-sm active:bg-gray-200">Prüfen</button>
                                                    </div>
                                                )}

                                                {inRange && !station.hasQuiz && (
                                                    <div className="mt-4">
                                                        <p className="text-sm text-gray-300 leading-relaxed mb-4">{station.infoText}</p>
                                                        <button onClick={() => {
                                                            const newSolved = {...solvedStations, [station.id]: true};
                                                            setSolvedStations(newSolved);
                                                            localStorage.setItem(`solved_${activeTourId}`, JSON.stringify(newSolved));
                                                        }} className="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg text-sm">Station abschließen</button>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    } else if (isLocked) {
                                        // LOCKED / UNKNOWN STATE
                                        nodeContent = <IconLock className="w-4 h-4 text-gray-500" />;
                                        cardStyle = "bg-black/40 border-gray-800 opacity-60";
                                        cardContent = (
                                            <div className="py-2">
                                                <h2 className="font-bold text-gray-400 italic">Unbekannte Station</h2>
                                                <p className="text-[10px] text-gray-600 mt-1 uppercase tracking-widest">Gesperrt</p>
                                            </div>
                                        );
                                    }

                                    return (
                                        <div key={station.id} className={`flex items-center w-full my-8 relative ${isLeft ? 'flex-row' : 'flex-row-reverse'}`}>
                                            
                                            {/* Node */}
                                            <div className={`absolute left-1/2 -translate-x-1/2 w-8 h-8 rounded-full flex items-center justify-center border-4 border-black z-10 shadow-lg transition-colors duration-500 ${isSolved ? 'bg-green-500' : isNextTarget ? 'bg-white' : 'bg-gray-900'}`}>
                                                {nodeContent}
                                            </div>

                                            {/* Card wrapper for width control and spacing */}
                                            <div className={`w-1/2 ${isLeft ? 'pr-8 pl-2 text-right' : 'pl-8 pr-2 text-left'}`}>
                                                {/* Actual Card */}
                                                <div className={`inline-block w-full max-w-[180px] p-4 rounded-2xl border shadow-xl transition-all duration-300 ${cardStyle} ${isLeft ? 'text-right' : 'text-left'}`}>
                                                    {cardContent}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                                {tourStations.length === 0 && <p className="text-center text-gray-500 italic mt-10">Noch keine Stationen angelegt.</p>}
                            </div>
                        </main>
                    </div>
                );
            };

            const Toast = () => toast ? <div className="fixed top-14 left-1/2 -translate-x-1/2 bg-darkCardSecondary/90 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-[100] border border-gray-700 font-medium whitespace-nowrap animate-slide-up">{toast}</div> : null;

            return (
                <div>
                    {view === 'loading' && <div className="min-h-screen bg-black flex items-center justify-center text-gray-500"><div className="w-6 h-6 border-2 border-iosBlue border-t-transparent rounded-full animate-spin"></div></div>}
                    {view === 'desktop' && <DesktopView />}
                    {view === 'login' && <LoginView />}
                    {view === 'admin_tours' && <AdminToursView />}
                    {view === 'admin_stations' && <AdminStationsView />}
                    {view === 'player_tours' && <PlayerToursView />}
                    {view === 'player_game' && <PlayerGameView />}
                    <Toast />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
